<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Wiki — Knowledge Graph</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #1c2128;
      --border:     #30363d;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --accent:     #7c3aed;
      --accent-lt:  #a78bfa;
      --bg-glass:   rgba(13,17,23,.88);
      --bg-overlay: rgba(22,27,34,.9);
    }

    body.light {
      --bg:         #ffffff;
      --surface:    #f6f8fa;
      --surface2:   #eaeef2;
      --border:     #d0d7de;
      --text:       #1c2128;
      --muted:      #57606a;
      --accent-lt:  #6d28d9;
      --bg-glass:   rgba(255,255,255,.92);
      --bg-overlay: rgba(246,248,250,.92);
    }

    html, body {
      height: 100%; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      transition: background .2s ease, color .2s ease;
    }

    /* ── HEADER ──────────────────────────────────────────────────────── */
    header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 100;
      height: 56px;
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px;
      background: var(--bg-glass);
      backdrop-filter: blur(12px) saturate(1.3);
      border-bottom: 1px solid var(--border);
    }

    /* ── SITE NAV ────────────────────────────────────────────────────── */
    .site-nav {
      display: flex; align-items: stretch; gap: 2px;
      height: 100%; flex-shrink: 0;
    }

    .site-nav a {
      display: flex; align-items: center;
      text-decoration: none;
      color: var(--muted); font-size: .82rem; font-weight: 500;
      padding: 0 13px; position: relative;
      transition: color .12s;
    }

    .site-nav a:hover { color: var(--text); }

    .site-nav a.active { color: var(--text); }

    .site-nav a.active::after {
      content: '';
      position: absolute; bottom: 0; left: 13px; right: 13px;
      height: 2px; background: var(--accent);
      border-radius: 1px 1px 0 0;
    }

    .brand-title {
      font-size: 1rem; font-weight: 700; letter-spacing: -.02em;
    }
    .brand-title .dot { color: var(--accent-lt); }

    .brand-sub { font-size: .72rem; color: var(--muted); }

    .header-hint {
      margin-left: auto;
      font-size: .72rem; color: var(--muted);
      display: flex; gap: 14px;
    }

    .hint-key {
      display: flex; align-items: center; gap: 5px;
    }

    kbd {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
      font-size: .65rem; font-family: inherit;
      color: var(--muted);
    }

    /* ── GRAPH WRAP ──────────────────────────────────────────────────── */
    #graph-wrap {
      position: absolute; inset: 56px 0 0 0;
    }

    svg {
      width: 100%; height: 100%;
      cursor: grab;
    }
    svg:active { cursor: grabbing; }

    /* ── LINKS ───────────────────────────────────────────────────────── */
    .link {
      fill: none;
      stroke: var(--border);
      stroke-opacity: .38;
      stroke-width: 1;
      transition: stroke-opacity .12s, stroke .12s;
    }
    .link.dimmed { stroke-opacity: .04; }
    .link.lit    { stroke-opacity: .82; stroke-width: 1.5; }

    /* ── NODES ───────────────────────────────────────────────────────── */
    .node { cursor: pointer; }

    .node-circle {
      transition: opacity .12s;
    }
    .node-circle.dimmed  { opacity: .12; }
    .node-circle.hovered { filter: drop-shadow(0 0 7px currentColor); }

    .node-ring {
      fill: none; stroke-width: 2; opacity: 0;
      transition: opacity .15s;
    }
    .node-ring.hovered { opacity: .85; }

    .node-label {
      font-size: 12px;
      fill: var(--text);
      pointer-events: none;
      transition: opacity .12s;
    }
    .node-label.dimmed { opacity: .08; }

    /* ── SIDE PANEL ──────────────────────────────────────────────────── */
    #panel {
      position: fixed;
      top: 56px; right: 0; bottom: 0;
      width: 540px; max-width: 92vw;
      background: var(--surface);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
      z-index: 250;
      display: flex; flex-direction: column;
      box-shadow: -8px 0 32px rgba(0,0,0,.4);
    }
    #panel.open { transform: translateX(0); }

    #panel-hd {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #panel-topbar {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }

    #panel-cat {
      font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
    }

    #panel-year {
      font-size: .7rem; color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 7px;
    }

    #panel-close {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 4px 10px; font-size: .75rem; cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    #panel-close:hover { border-color: var(--muted); color: var(--text); }

    #panel-title {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      color: var(--text); margin-bottom: 10px;
    }

    #panel-tags {
      display: flex; flex-wrap: wrap; gap: 5px;
    }

    #panel-tags .ptag {
      font-size: .68rem; color: var(--accent-lt);
      background: transparent;
      border: 1px solid rgba(124,58,237,.45);
      border-radius: 12px; padding: 2px 9px;
      cursor: pointer; user-select: none;
      transition: background .12s, color .12s, border-color .12s;
    }
    #panel-tags .ptag:hover { background: rgba(124,58,237,.18); }
    #panel-tags .ptag.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    #panel-body {
      flex: 1; overflow-y: auto; padding: 22px 22px 32px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    #panel-body::-webkit-scrollbar { width: 5px; }
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #panel-body h1 { display: none; }
    #panel-body h2 {
      font-size: .97rem; font-weight: 700; color: var(--text);
      margin: 24px 0 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    #panel-body h3 {
      font-size: .88rem; font-weight: 600; color: var(--text);
      margin: 18px 0 7px;
    }
    #panel-body p {
      font-size: .855rem; color: var(--muted);
      margin-bottom: 13px; line-height: 1.75;
    }
    #panel-body ul, #panel-body ol {
      padding-left: 18px; margin-bottom: 13px;
    }
    #panel-body li {
      font-size: .855rem; color: var(--muted);
      margin-bottom: 5px; line-height: 1.7;
    }
    #panel-body blockquote {
      border-left: 3px solid var(--accent);
      background: rgba(124,58,237,.10);
      border-radius: 0 6px 6px 0;
      padding: 9px 15px; margin: 14px 0;
    }
    #panel-body blockquote p {
      color: var(--accent-lt); margin: 0;
      font-size: .83rem; font-style: italic; line-height: 1.6;
    }
    #panel-body code {
      font-family: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;
      font-size: .8rem; color: #e3b341;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
    }
    body.light #panel-body code { color: #b45309; }
    #panel-body pre {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; overflow-x: auto; margin: 12px 0;
    }
    #panel-body pre code { background: none; border: none; padding: 0; color: var(--text); }
    #panel-body table {
      width: 100%; border-collapse: collapse;
      font-size: .8rem; margin: 14px 0;
    }
    #panel-body th {
      background: var(--surface2); color: var(--text); font-weight: 600;
      padding: 7px 10px; border: 1px solid var(--border); text-align: left;
    }
    #panel-body td {
      padding: 7px 10px; border: 1px solid var(--border);
      color: var(--muted); vertical-align: top;
    }
    #panel-body a {
      color: var(--accent-lt); text-decoration: none;
      border-bottom: 1px solid rgba(167,139,250,.35);
    }
    #panel-body a:hover { color: #c4b5fd; }

    /* obsidian-only blocks */
    .obsidian-note {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      font-size: 13px;
      font-style: italic;
      color: var(--muted);
      border-radius: 4px;
      margin: 8px 0;
    }

    /* tag-filter bar at the bottom of the graph when filters active */
    #tag-filter-bar {
      display: none; flex-wrap: wrap; align-items: center; gap: 6px;
      position: absolute; top: 70px; left: 16px; z-index: 60;
      max-width: calc(100% - 250px);
      padding: 6px 10px;
      background: var(--bg-overlay);
      border: 1px solid var(--border);
      border-radius: 8px;
      backdrop-filter: blur(8px);
    }
    #tag-filter-bar.on { display: flex; }
    .tf-label { font-size: .68rem; color: var(--muted); margin-right: 2px; }
    .tf-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .68rem; font-weight: 600;
      background: var(--accent); color: #fff;
      border: 1px solid var(--accent);
      border-radius: 12px; padding: 2px 9px;
      cursor: pointer;
    }
    .tf-pill .x {
      display: inline-flex; align-items: center; justify-content: center;
      width: 13px; height: 13px; border-radius: 50%;
      background: rgba(255,255,255,.22); font-size: .6rem; line-height: 1;
    }
    .tf-clear {
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 12px;
      padding: 2px 9px; font-size: .65rem; cursor: pointer;
    }
    .tf-clear:hover { color: var(--text); border-color: var(--muted); }

    /* ── LEGEND ──────────────────────────────────────────────────────── */
    #legend {
      position: absolute; bottom: 20px; left: 20px; z-index: 50;
      background: var(--bg-overlay);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
      backdrop-filter: blur(8px);
    }

    .legend-title {
      font-size: .65rem; font-weight: 600;
      color: var(--muted); letter-spacing: .08em;
      text-transform: uppercase; margin-bottom: 8px;
    }

    .legend-item {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 5px; font-size: .73rem; color: var(--muted);
    }
    .legend-item:last-child { margin-bottom: 0; }

    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── NODE COUNT BADGE ────────────────────────────────────────────── */
    #status {
      position: absolute; bottom: 20px; right: 20px; z-index: 50;
      font-size: .72rem; color: var(--muted);
      background: var(--bg-overlay);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px;
      backdrop-filter: blur(8px);
    }

    /* ── THEME TOGGLE ────────────────────────────────────────────────── */
    .theme-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; line-height: 1;
      cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    .theme-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ── RESET BUTTON ────────────────────────────────────────────────── */
    #reset-btn {
      position: absolute; top: 70px; right: 16px; z-index: 50;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 6px 12px; font-size: .75rem; cursor: pointer;
      transition: color .12s, border-color .12s;
    }
    #reset-btn:hover { color: var(--text); border-color: var(--muted); }
  </style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────────────────────────── -->
<header>
  <div>
    <div class="brand-title">Knowledge Graph<span class="dot">.</span></div>
    <div class="brand-sub">LLM Wiki — force-directed concept map · Curated by Saqlain</div>
  </div>

  <nav class="site-nav">
    <a href="index.html">Browse notes</a>
    <a href="graph.html" class="active">Knowledge graph</a>
  </nav>

  <div class="header-hint">
    <span class="hint-key"><kbd>scroll</kbd> zoom</span>
    <span class="hint-key"><kbd>drag</kbd> pan / move nodes</span>
    <span class="hint-key"><kbd>click</kbd> open note</span>
    <span class="hint-key"><kbd>hover</kbd> highlight links</span>
  </div>
  <button id="theme-btn" class="theme-btn" aria-label="Toggle theme" title="Toggle light/dark mode">☾</button>
</header>

<!-- ── GRAPH ─────────────────────────────────────────────────────────────── -->
<div id="graph-wrap">
  <svg id="graph"></svg>
</div>

<!-- ── TAG FILTER BAR ────────────────────────────────────────────────────── -->
<div id="tag-filter-bar"></div>

<!-- ── SIDE PANEL ────────────────────────────────────────────────────────── -->
<div id="panel">
  <div id="panel-hd">
    <div id="panel-topbar">
      <span id="panel-cat"></span>
      <span id="panel-year"></span>
      <button id="panel-close">close</button>
    </div>
    <div id="panel-title"></div>
    <div id="panel-tags"></div>
  </div>
  <div id="panel-body"></div>
</div>

<!-- ── LEGEND ────────────────────────────────────────────────────────────── -->
<div id="legend">
  <div class="legend-title">Category</div>
</div>

<!-- ── STATUS ────────────────────────────────────────────────────────────── -->
<div id="status"></div>

<!-- ── RESET ─────────────────────────────────────────────────────────────── -->
<button id="reset-btn" title="Reset zoom">⊡ Reset view</button>

<script>
"use strict";

// ── theme ─────────────────────────────────────────────────────────────────
(function () {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.body.classList.add('light');
})();

const getCSSVar = v => getComputedStyle(document.body).getPropertyValue(v).trim();

// ── Category + color map ─────────────────────────────────────────────────
const CAT_COLORS = {
  index:        { color: '#f59e0b', label: 'Index / Meta'       },
  foundational: { color: '#7c3aed', label: 'Foundational'       },
  moe:          { color: '#ea580c', label: 'Mixture-of-Experts'  },
  ssm:          { color: '#0d9488', label: 'State Space Models'  },
  attention:    { color: '#2563eb', label: 'Attention / KV'      },
  posttraining: { color: '#e11d48', label: 'Post-training / RL'  },
  efficiency:   { color: '#16a34a', label: 'Efficiency / HW'     },
  other:        { color: '#64748b', label: 'Other'               },
};

function categorize(note) {
  const t = new Set(note.tags);
  if (t.has('index') || t.has('meta') || t.has('dashboard'))           return 'index';
  if (t.has('foundational') || t.has('architecture'))                  return 'foundational';
  if (t.has('moe') || t.has('routing'))                                return 'moe';
  if (t.has('ssm') || t.has('linear-time') || t.has('recurrence') ||
      t.has('mamba'))                                                   return 'ssm';
  if (t.has('post-training') || t.has('rl') || t.has('reward') ||
      t.has('distillation'))                                            return 'posttraining';
  if (t.has('attention') || t.has('kv-cache') || t.has('long-context')||
      t.has('compression') || t.has('sparse-attention'))               return 'attention';
  if (t.has('inference') || t.has('efficiency') || t.has('quantization')||
      t.has('hardware') || t.has('throughput') || t.has('kernel-fusion'))return 'efficiency';
  return 'other';
}

function nodeLabel(d) {
  // Strip leading digits/emoji/dashes, replace separators with spaces, truncate
  let s = d.id
    .replace(/^[0-9🗺️\-]+/, '')
    .replace(/[-_]/g, ' ')
    .trim();
  if (!s) s = d.id;
  return s.length > 24 ? s.slice(0, 22) + '…' : s;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Tag-filter state ─────────────────────────────────────────────────────
const activeTags = new Set();
let byId = {};

// ── Main ─────────────────────────────────────────────────────────────────
async function main() {
  const raw = await fetch('notes.json').then(r => r.json());
  raw.forEach(n => { byId[n.id] = n; });

  const idSet = new Set(raw.map(n => n.id));

  // Incoming link counts
  const inCount = {};
  raw.forEach(n => { inCount[n.id] = 0; });
  raw.forEach(n => {
    n.links.forEach(l => { if (idSet.has(l)) inCount[l] = (inCount[l] || 0) + 1; });
  });

  // Nodes
  const nodes = raw.map(n => ({
    id:       n.id,
    title:    n.title,
    tags:     n.tags,
    tldr:     n.tldr,
    year:     n.year,
    cat:      categorize(n),
    inCount:  inCount[n.id] || 0,
    r:        7 + Math.sqrt(inCount[n.id] || 0) * 3.8,
  }));

  // Edges — deduplicated, only between known nodes
  const edgeSeen = new Set();
  const edges = [];
  raw.forEach(n => {
    n.links.forEach(l => {
      if (!idSet.has(l)) return;
      const key = `${n.id}→${l}`;
      if (!edgeSeen.has(key)) {
        edgeSeen.add(key);
        edges.push({ source: n.id, target: l });
      }
    });
  });

  // Adjacency for hover (bidirectional lookup)
  const adj = new Map(); // id → Set<id>
  edges.forEach(e => {
    if (!adj.has(e.source)) adj.set(e.source, new Set());
    if (!adj.has(e.target)) adj.set(e.target, new Set());
    adj.get(e.source).add(e.target);
    adj.get(e.target).add(e.source);
  });

  function isAdj(a, b) { return adj.has(a) && adj.get(a).has(b); }

  // ── SVG setup ────────────────────────────────────────────────────────
  const wrap   = document.getElementById('graph-wrap');
  const width  = wrap.clientWidth;
  const height = wrap.clientHeight;

  const svg = d3.select('#graph')
    .attr('width', width)
    .attr('height', height);

  // Arrowhead markers — one per category color
  const defs = svg.append('defs');
  Object.entries(CAT_COLORS).forEach(([cat, { color }]) => {
    defs.append('marker')
      .attr('id', `arr-${cat}`)
      .attr('viewBox', '0 -4 8 8')
      .attr('refX', 8).attr('refY', 0)
      .attr('markerWidth', 5).attr('markerHeight', 5)
      .attr('orient', 'auto')
      .append('path')
        .attr('d', 'M0,-4L8,0L0,4')
        .attr('fill', color).attr('fill-opacity', .75);
  });
  // Default dimmed arrow — save reference so theme toggle can recolor it
  const dimArrowPath = defs.append('marker')
    .attr('id', 'arr-dim')
    .attr('viewBox', '0 -4 8 8')
    .attr('refX', 8).attr('refY', 0)
    .attr('markerWidth', 5).attr('markerHeight', 5)
    .attr('orient', 'auto')
    .append('path')
      .attr('d', 'M0,-4L8,0L0,4')
      .attr('fill', getCSSVar('--border'));

  // Zoom behaviour — transform a root <g>
  const zoom = d3.zoom()
    .scaleExtent([0.2, 4])
    .on('zoom', e => root.attr('transform', e.transform));

  svg.call(zoom);

  // Background click on the SVG closes the panel
  svg.on('click', closePanel);

  const root = svg.append('g');

  // ── Force simulation ─────────────────────────────────────────────────
  const sim = d3.forceSimulation(nodes)
    .force('link',    d3.forceLink(edges).id(d => d.id)
                        .distance(120).strength(0.45))
    .force('charge',  d3.forceManyBody()
                        .strength(d => -220 - d.r * 8)
                        .distanceMax(500))
    .force('center',  d3.forceCenter(width / 2, height / 2).strength(0.08))
    .force('collide', d3.forceCollide().radius(d => d.r + 20).strength(0.8));

  // ── Draw links ───────────────────────────────────────────────────────
  const linkSel = root.append('g').attr('class', 'links')
    .selectAll('line')
    .data(edges)
    .join('line')
      .attr('class', 'link')
      .attr('marker-end', 'url(#arr-dim)');

  // ── Draw node groups ─────────────────────────────────────────────────
  const nodeSel = root.append('g').attr('class', 'nodes')
    .selectAll('g')
    .data(nodes)
    .join('g')
      .attr('class', 'node')
      .call(
        d3.drag()
          .on('start', (e, d) => {
            if (!e.active) sim.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
          })
          .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
          .on('end',   (e, d) => {
            if (!e.active) sim.alphaTarget(0);
            d.fx = null; d.fy = null;
          })
      );

  // Glow ring (shown on hover)
  nodeSel.append('circle')
    .attr('class', 'node-ring')
    .attr('r', d => d.r + 5)
    .attr('stroke', d => CAT_COLORS[d.cat].color);

  // Main circle
  nodeSel.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => d.r)
    .attr('fill',         d => CAT_COLORS[d.cat].color)
    .attr('fill-opacity', .78)
    .attr('stroke',       d => CAT_COLORS[d.cat].color)
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', .55);

  // Labels — below the node
  nodeSel.append('text')
    .attr('class', 'node-label')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'hanging')
    .attr('dy', d => d.r + 5)
    .attr('font-size', '12px')
    .text(nodeLabel);

  // ── Hover ────────────────────────────────────────────────────────────
  let hovered = null;

  function applyHover(id) {
    hovered = id;

    // Links
    linkSel
      .attr('class', l => {
        const s = l.source.id, t = l.target.id;
        if (s === id || t === id) return 'link lit';
        return 'link dimmed';
      })
      .attr('stroke', l => {
        const s = l.source.id;
        if (s === id || l.target.id === id) return CAT_COLORS[nodes.find(n=>n.id===s).cat].color;
        return getCSSVar('--border');
      })
      .attr('marker-end', l => {
        const s = l.source.id;
        if (s === id || l.target.id === id)
          return `url(#arr-${nodes.find(n => n.id === s).cat})`;
        return 'url(#arr-dim)';
      });

    // Circles
    nodeSel.select('.node-circle')
      .attr('class', d => 'node-circle' + (d.id === id || isAdj(id, d.id) ? ' hovered' : ' dimmed'));

    // Rings
    nodeSel.select('.node-ring')
      .attr('class', d => 'node-ring' + (d.id === id ? ' hovered' : ''));

    // Labels
    nodeSel.select('.node-label')
      .attr('class', d => 'node-label' + (d.id === id || isAdj(id, d.id) ? '' : ' dimmed'));
  }

  function clearHover() {
    hovered = null;
    linkSel
      .attr('class', 'link')
      .attr('stroke', getCSSVar('--border'))
      .attr('marker-end', 'url(#arr-dim)');
    nodeSel.select('.node-circle').attr('class', 'node-circle');
    nodeSel.select('.node-ring').attr('class', 'node-ring');
    nodeSel.select('.node-label').attr('class', 'node-label');
    // Re-apply tag filter dimming if any filters are active.
    if (activeTags.size > 0) applyTagFilter();
  }

  nodeSel
    .on('mouseenter', (_, d) => applyHover(d.id))
    .on('mouseleave', () => clearHover())
    .on('click', (event, d) => {
      event.stopPropagation();
      openPanel(d.id);
    });

  // ── Tick ─────────────────────────────────────────────────────────────
  sim.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => {
        const dx = d.target.x - d.source.x;
        const dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return d.target.x - (dx / dist) * d.target.r;
      })
      .attr('y2', d => {
        const dx = d.target.x - d.source.x;
        const dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        return d.target.y - (dy / dist) * d.target.r;
      });

    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // ── Side Panel ────────────────────────────────────────────────────────
  const panel       = document.getElementById('panel');
  const panelCat    = document.getElementById('panel-cat');
  const panelYear   = document.getElementById('panel-year');
  const panelTitle  = document.getElementById('panel-title');
  const panelTags   = document.getElementById('panel-tags');
  const panelBody   = document.getElementById('panel-body');
  const panelClose  = document.getElementById('panel-close');

  panelClose.addEventListener('click', closePanel);
  panel.addEventListener('click', e => e.stopPropagation());

  // Convert [[WikiLink]] in raw HTML to <a> links that open another node
  function resolveWikilinks(html) {
    return html.replace(
      /\[\[([^\]|#]+?)(?:[|#][^\]]*)?\]\]/g,
      (_, ref) => {
        const label = ref.trim();
        const id = label.replace(/\s+/g, '-');
        const exists = byId[id] || byId[label];
        const resolvedId = exists ? (byId[id] ? id : label) : id;
        return `<a href="#" data-noteid="${esc(resolvedId)}" class="wl">${esc(label)}</a>`;
      }
    );
  }

  function openPanel(id) {
    const d = byId[id];
    if (!d) return;

    const { color, label } = CAT_COLORS[categorize(d)] || CAT_COLORS.other;
    panelCat.textContent  = label;
    panelCat.style.color  = color;
    panelYear.textContent = d.year || '';
    panelYear.style.display = d.year ? 'inline-block' : 'none';
    panelTitle.textContent = d.title;

    panelTags.innerHTML = d.tags.map(t =>
      `<span class="ptag${activeTags.has(t) ? ' active' : ''}" data-tag="${esc(t)}">${esc(t)}</span>`
    ).join('');
    panelTags.querySelectorAll('.ptag').forEach(el =>
      el.addEventListener('click', e => {
        e.stopPropagation();
        toggleTagFilter(el.dataset.tag);
        // Refresh panel pill highlight without rebuilding the whole panel
        el.classList.toggle('active', activeTags.has(el.dataset.tag));
      })
    );

    panelBody.innerHTML = resolveWikilinks(d.html || '');
    panelBody.querySelectorAll('a.wl').forEach(a =>
      a.addEventListener('click', e => {
        e.preventDefault();
        const targetId = a.dataset.noteid;
        if (byId[targetId]) openPanel(targetId);
      })
    );
    panelBody.scrollTop = 0;

    panel.classList.add('open');
  }

  function closePanel() {
    panel.classList.remove('open');
  }

  // ── Tag filter (applied to the graph) ─────────────────────────────────
  const tagBar = document.getElementById('tag-filter-bar');

  function nodeMatchesActiveTags(n) {
    for (const t of activeTags) if (!n.tags.includes(t)) return false;
    return true;
  }

  function applyTagFilter() {
    const hasFilter = activeTags.size > 0;

    nodeSel.select('.node-circle')
      .classed('dimmed', d => hasFilter && !nodeMatchesActiveTags(d));
    nodeSel.select('.node-label')
      .classed('dimmed', d => hasFilter && !nodeMatchesActiveTags(d));

    linkSel.classed('dimmed', l => {
      if (!hasFilter) return false;
      const sId = typeof l.source === 'object' ? l.source.id : l.source;
      const tId = typeof l.target === 'object' ? l.target.id : l.target;
      return !(nodeMatchesActiveTags(byId[sId]) && nodeMatchesActiveTags(byId[tId]));
    });

    // Render the visible filter bar
    if (!hasFilter) {
      tagBar.classList.remove('on');
      tagBar.innerHTML = '';
      return;
    }
    tagBar.classList.add('on');
    tagBar.innerHTML =
      `<span class="tf-label">Filtering:</span>` +
      [...activeTags].map(t =>
        `<span class="tf-pill" data-tag="${esc(t)}">${esc(t)}<span class="x">×</span></span>`
      ).join('') +
      `<button class="tf-clear" id="tf-clear">Clear</button>`;
    tagBar.querySelectorAll('.tf-pill').forEach(el =>
      el.addEventListener('click', () => {
        activeTags.delete(el.dataset.tag);
        applyTagFilter();
        // Refresh panel pill highlight if open
        panel.querySelectorAll('#panel-tags .ptag').forEach(p => {
          p.classList.toggle('active', activeTags.has(p.dataset.tag));
        });
      })
    );
    tagBar.querySelector('#tf-clear').addEventListener('click', () => {
      activeTags.clear();
      applyTagFilter();
      panel.querySelectorAll('#panel-tags .ptag').forEach(p => p.classList.remove('active'));
    });
  }

  function toggleTagFilter(tag) {
    if (!tag) return;
    if (activeTags.has(tag)) activeTags.delete(tag);
    else                     activeTags.add(tag);
    applyTagFilter();
  }

  // ── Legend ───────────────────────────────────────────────────────────
  const legend = document.getElementById('legend');
  const usedCats = [...new Set(nodes.map(n => n.cat))];
  usedCats.forEach(cat => {
    const { color, label } = CAT_COLORS[cat];
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `
      <span class="legend-dot" style="background:${color}"></span>
      <span>${label}</span>
    `;
    // Click legend to filter by category
    item.style.cursor = 'pointer';
    item.addEventListener('click', () => {
      const target = nodes.find(n => n.cat === cat);
      if (target && hovered !== target.id) applyHover(target.id);
      else clearHover();
    });
    legend.appendChild(item);
  });

  // ── Status ───────────────────────────────────────────────────────────
  document.getElementById('status').textContent =
    `${nodes.length} nodes · ${edges.length} edges`;

  // ── Reset zoom ────────────────────────────────────────────────────────
  document.getElementById('reset-btn').addEventListener('click', () => {
    svg.transition().duration(500)
      .call(zoom.transform, d3.zoomIdentity
        .translate(width / 2, height / 2)
        .scale(0.9)
        .translate(-width / 2, -height / 2));
  });

  // ── Keyboard ──────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closePanel(); clearHover(); }
  });

  // Resize handler
  window.addEventListener('resize', () => {
    const w = wrap.clientWidth, h = wrap.clientHeight;
    svg.attr('width', w).attr('height', h);
    sim.force('center', d3.forceCenter(w / 2, h / 2).strength(0.08));
  });

  // Expose D3 repaint for theme toggle
  return { dimArrowPath, linkSel };
}

async function init() {
  const { dimArrowPath, linkSel } = await main();

  const btn = document.getElementById('theme-btn');
  btn.textContent = document.body.classList.contains('light') ? '☀' : '☾';

  btn.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    btn.textContent = isLight ? '☀' : '☾';

    // Repaint D3 elements that use hardcoded border color
    const border = getCSSVar('--border');
    dimArrowPath.attr('fill', border);
    linkSel.filter('.link:not(.lit):not(.dimmed)').attr('stroke', border);
  });
}

init();
</script>
</body>
</html>
