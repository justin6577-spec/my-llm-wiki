<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Wiki</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #1c2128;
      --border:      #30363d;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --accent:      #7c3aed;
      --accent-lt:   #a78bfa;
      --accent-dim:  rgba(124,58,237,.14);
      --accent-ring: rgba(124,58,237,.45);
      --tag-bg:      rgba(124,58,237,.18);
      --panel-w:     540px;
      --bg-glass:    rgba(13,17,23,.90);
      --code-color:  #e3b341;
      --bq-color:    #b8a0e8;
    }

    body.light {
      --bg:          #ffffff;
      --surface:     #f6f8fa;
      --surface2:    #eaeef2;
      --border:      #d0d7de;
      --text:        #1c2128;
      --muted:       #57606a;
      --accent-lt:   #6d28d9;
      --accent-dim:  rgba(124,58,237,.08);
      --accent-ring: rgba(124,58,237,.25);
      --tag-bg:      rgba(124,58,237,.08);
      --bg-glass:    rgba(255,255,255,.92);
      --code-color:  #b45309;
      --bq-color:    #6d28d9;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
      transition: background .2s ease, color .2s ease;
    }

    /* ── SITE NAV ───────────────────────────────────────────────────── */
    .site-nav {
      display: flex; align-items: stretch; gap: 2px;
      height: 100%; flex-shrink: 0;
    }

    .site-nav a {
      display: flex; align-items: center;
      text-decoration: none;
      color: var(--muted); font-size: .82rem; font-weight: 500;
      padding: 0 13px; position: relative;
      transition: color .12s;
    }

    .site-nav a:hover { color: var(--text); }
    .site-nav a.active { color: var(--text); }

    .site-nav a.active::after {
      content: '';
      position: absolute; bottom: 0; left: 13px; right: 13px;
      height: 2px; background: var(--accent);
      border-radius: 1px 1px 0 0;
    }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 200;
      background: var(--bg-glass);
      backdrop-filter: blur(14px) saturate(1.4);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex; align-items: center; gap: 18px;
    }

    .brand { flex-shrink: 0; }

    .brand-title {
      font-size: 1.15rem; font-weight: 700; letter-spacing: -.03em;
      color: var(--text);
    }
    .brand-title .dot { color: var(--accent-lt); }

    .brand-sub {
      font-size: .72rem; color: var(--muted); margin-top: 1px;
      letter-spacing: .01em;
    }

    .search-wrap {
      flex: 1; max-width: 440px; position: relative;
    }

    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 34px;
      color: var(--text); font-size: .875rem;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    #search::placeholder { color: var(--muted); }

    .kbd {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: .65rem; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; pointer-events: none;
    }

    /* active filter bar */
    #active-filters {
      display: none; flex-wrap: wrap; align-items: center; gap: 6px;
      margin-bottom: 14px;
    }
    #active-filters.on { display: flex; }

    .active-filter-label {
      font-size: .72rem; color: var(--muted); margin-right: 2px;
    }

    .filter-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: 1px solid var(--accent);
      border-radius: 20px; padding: 4px 10px;
      font-size: .72rem; font-weight: 600;
      cursor: pointer;
      transition: background .12s;
    }
    .filter-pill:hover { background: #6d28d9; border-color: #6d28d9; }

    .filter-pill .x {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,.22);
      font-size: .65rem; line-height: 1;
    }

    .clear-all-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px; padding: 3px 11px;
      font-size: .7rem; cursor: pointer;
      transition: color .12s, border-color .12s;
    }
    .clear-all-btn:hover { color: var(--text); border-color: var(--muted); }

    .header-count {
      margin-left: auto; font-size: .75rem; color: var(--muted);
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── THEME TOGGLE ────────────────────────────────────────────────── */
    .theme-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; line-height: 1;
      cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    .theme-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ── LAYOUT ─────────────────────────────────────────────────────── */
    #app {
      display: flex;
      height: calc(100vh - 64px);
    }

    /* ── GRID PANE ───────────────────────────────────────────────────── */
    #grid-pane {
      flex: 1; min-width: 0;
      overflow-y: auto; padding: 24px;
    }

    /* ── TAB BAR ─────────────────────────────────────────────────────── */
    .tab-bar {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .tab-btn {
      background: none; border: none;
      color: var(--muted); font-size: .83rem; font-weight: 500;
      padding: 8px 16px; cursor: pointer;
      position: relative;
      transition: color .12s;
    }
    .tab-btn:hover { color: var(--text); }

    .tab-btn.active { color: var(--text); }

    .tab-btn.active::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: var(--accent);
      border-radius: 1px 1px 0 0;
    }

    /* ── RESULT BAR ──────────────────────────────────────────────────── */
    #result-bar {
      font-size: .75rem; color: var(--muted); margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }

    /* ── SORT SELECT ─────────────────────────────────────────────────── */
    .sort-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: .73rem;
      cursor: pointer;
      margin-left: auto;
      outline: none;
      transition: border-color .12s;
    }
    .sort-select:hover { border-color: var(--muted); color: var(--text); }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 13px;
    }

    /* ── CARD ────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 17px 18px;
      cursor: pointer; display: flex; flex-direction: column; gap: 10px;
      transition: border-color .15s, box-shadow .15s, transform .1s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 6px 24px rgba(124,58,237,.1);
      transform: translateY(-2px);
    }

    .card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
    }

    .card-title {
      font-size: .93rem; font-weight: 600; line-height: 1.4; color: var(--text);
    }

    /* ── CARD META (year + citation stacked) ─────────────────────────── */
    .card-meta {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px;
      flex-shrink: 0;
    }

    .year-badge {
      flex-shrink: 0;
      font-size: .68rem; font-weight: 700;
      color: var(--accent-lt);
      background: var(--accent-dim);
      border: 1px solid var(--accent-ring);
      border-radius: 4px; padding: 2px 7px;
    }

    /* ── CITATION BADGE (card) ───────────────────────────────────────── */
    .citation-badge {
      display: inline-block;
      font-size: .63rem; font-weight: 600;
      color: var(--accent-lt);
      background: var(--tag-bg);
      border: 1px solid var(--accent-ring);
      border-radius: 10px; padding: 1px 7px;
      white-space: nowrap;
    }

    .card-tldr {
      font-size: .81rem; color: var(--muted); line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tldr em { font-style: italic; opacity: .6; }

    /* ── TAGS ────────────────────────────────────────────────────────── */
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }

    .tag {
      font-size: .68rem; color: var(--accent-lt);
      background: transparent;
      border: 1px solid var(--accent-ring);
      border-radius: 12px; padding: 2px 9px;
      cursor: pointer; user-select: none;
      transition: background .12s, color .12s, border-color .12s;
    }
    .tag:hover { background: var(--accent-dim); }
    .tag.active-tag {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
    }
    .tag.active-tag:hover { background: #6d28d9; border-color: #6d28d9; }

    /* ── EMPTY STATE ─────────────────────────────────────────────────── */
    #empty {
      display: none; grid-column: 1/-1;
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    #empty.show { display: block; }
    #empty svg { opacity: .25; margin-bottom: 14px; }
    #empty p { font-size: .9rem; }

    /* ── RANKED LIST (Top Cited tab) ─────────────────────────────────── */
    .ranked-list {
      grid-column: 1 / -1;
      display: flex; flex-direction: column; gap: 8px;
      max-width: 740px;
    }

    .ranked-item {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .1s;
    }
    .ranked-item:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 4px 16px rgba(124,58,237,.1);
      transform: translateY(-1px);
    }

    .ranked-num {
      font-size: 1rem; font-weight: 700;
      color: var(--muted); min-width: 28px;
      text-align: right; flex-shrink: 0;
    }
    .ranked-num.gold   { color: #f59e0b; }
    .ranked-num.silver { color: #94a3b8; }
    .ranked-num.bronze { color: #a16207; }

    .ranked-info { flex: 1; min-width: 0; }

    .ranked-title {
      font-size: .92rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .ranked-meta {
      font-size: .73rem; color: var(--muted); margin-top: 2px;
    }

    .ranked-count {
      font-size: .83rem; font-weight: 700;
      color: var(--accent-lt); white-space: nowrap; flex-shrink: 0;
    }

    /* ── BY THEME (By Theme tab) ─────────────────────────────────────── */
    .theme-section {
      grid-column: 1 / -1;
      margin-bottom: 28px;
    }

    .theme-heading {
      font-size: .78rem; font-weight: 700; color: var(--muted);
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 12px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .theme-heading .theme-count {
      font-weight: 400; font-size: .72rem; margin-left: 6px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 13px;
    }

    /* ── DETAIL PANEL ────────────────────────────────────────────────── */
    #panel {
      flex-shrink: 0;
      width: 0; overflow: hidden;
      border-left: 1px solid transparent;
      background: var(--surface);
      display: flex; flex-direction: column;
      transition: width .22s cubic-bezier(.4,0,.2,1),
                  border-color .22s;
    }

    #panel.open {
      width: var(--panel-w);
      border-left-color: var(--border);
    }

    #panel-inner {
      width: var(--panel-w); height: 100%;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* panel header */
    #panel-hd {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #panel-topbar {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }

    .panel-meta {
      display: flex; align-items: center; gap: 8px;
    }

    #panel-year {
      font-size: .72rem; font-weight: 700; color: var(--accent-lt);
      letter-spacing: .04em;
    }

    /* ── PANEL CITATION ──────────────────────────────────────────────── */
    #panel-citations {
      display: none;
      font-size: .7rem; font-weight: 600;
      color: var(--accent-lt);
      background: var(--tag-bg);
      border: 1px solid var(--accent-ring);
      border-radius: 4px; padding: 1px 8px;
    }

    #close-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 4px 11px; font-size: .75rem; cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    #close-btn:hover { border-color: var(--muted); color: var(--text); }

    #panel-title {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      color: var(--text); margin-bottom: 10px;
    }

    /* panel body */
    #panel-body {
      flex: 1; overflow-y: auto; padding: 24px 22px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    /* prose */
    #panel-body h1 { display: none; }

    #panel-body h2 {
      font-size: .97rem; font-weight: 700; color: var(--text);
      margin: 26px 0 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    #panel-body h3 {
      font-size: .88rem; font-weight: 600; color: var(--text);
      margin: 18px 0 7px;
    }

    #panel-body p {
      font-size: .855rem; color: var(--muted);
      margin-bottom: 13px; line-height: 1.75;
    }

    #panel-body ul, #panel-body ol {
      padding-left: 18px; margin-bottom: 13px;
    }

    #panel-body li {
      font-size: .855rem; color: var(--muted);
      margin-bottom: 5px; line-height: 1.7;
    }

    #panel-body blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-dim);
      border-radius: 0 6px 6px 0;
      padding: 9px 15px; margin: 14px 0;
    }

    #panel-body blockquote p {
      color: var(--bq-color); margin: 0;
      font-size: .83rem; font-style: italic; line-height: 1.6;
    }

    #panel-body code {
      font-family: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;
      font-size: .8rem; color: var(--code-color);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
    }

    #panel-body pre {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; overflow-x: auto; margin: 12px 0;
    }

    #panel-body pre code {
      background: none; border: none; padding: 0; color: var(--text);
    }

    #panel-body table {
      width: 100%; border-collapse: collapse;
      font-size: .8rem; margin: 14px 0;
    }

    #panel-body th {
      background: var(--surface2); color: var(--text);
      font-weight: 600; padding: 7px 10px;
      border: 1px solid var(--border); text-align: left;
    }

    #panel-body td {
      padding: 7px 10px; border: 1px solid var(--border);
      color: var(--muted); vertical-align: top;
    }

    #panel-body tr:nth-child(even) td { background: rgba(255,255,255,.02); }

    /* obsidian-only blocks (dataview / mermaid / embeds) */
    .obsidian-note {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      font-size: 13px;
      font-style: italic;
      color: var(--muted);
      border-radius: 4px;
      margin: 8px 0;
    }

    /* wikilinks inside panel */
    .wikilink {
      color: var(--accent-lt); text-decoration: none;
      border-bottom: 1px solid rgba(167,139,250,.35);
      transition: color .12s, border-color .12s;
    }
    .wikilink:hover { color: #c4b5fd; border-bottom-color: #c4b5fd; }
    .wikilink.missing { color: var(--muted); border-bottom-style: dashed; }

    /* ── SCROLLBARS ──────────────────────────────────────────────────── */
    #grid-pane::-webkit-scrollbar,
    #panel-body::-webkit-scrollbar { width: 5px; }
    #grid-pane::-webkit-scrollbar-track,
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #grid-pane::-webkit-scrollbar-thumb,
    #panel-body::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 3px;
    }

    /* ── MOBILE ──────────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      header { padding: 0 16px; flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 10px; }
      .kbd { display: none; }
      .header-count { display: none; }
      .search-wrap { order: 3; max-width: 100%; flex-basis: 100%; }

      #app { flex-direction: column; height: auto; min-height: calc(100vh - 80px); }
      #grid-pane { overflow: visible; }
      #panel {
        width: 100% !important;
        border-left: none !important;
        border-top: 1px solid transparent;
        max-height: 0;
        transition: max-height .3s ease, border-color .3s;
      }
      #panel.open { max-height: 80vh; border-top-color: var(--border); }
      #panel-inner { width: 100%; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-title">LLM Wiki<span class="dot">.</span></div>
    <div class="brand-sub">AI research knowledge base — papers, concepts &amp; intuitions · Curated by Saqlain</div>
  </div>

  <nav class="site-nav">
    <a href="index.html" class="active">Browse notes</a>
    <a href="graph.html">Knowledge graph</a>
  </nav>

  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text"
           placeholder="Search titles, summaries, tags…"
           autocomplete="off" spellcheck="false">
    <span class="kbd">⌘K</span>
  </div>

  <div class="header-count" id="header-count"></div>
  <button id="theme-btn" class="theme-btn" aria-label="Toggle theme" title="Toggle light/dark mode">☾</button>
</header>

<!-- ── APP ───────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- grid -->
  <div id="grid-pane">

    <!-- tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="all">All</button>
      <button class="tab-btn" data-tab="top-cited">Top Cited</button>
      <button class="tab-btn" data-tab="by-theme">By Theme</button>
    </div>

    <div id="result-bar"></div>
    <div id="active-filters"></div>
    <div id="grid">
      <div id="empty">
        <svg width="42" height="42" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.3">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <p>No notes match your search.</p>
      </div>
    </div>
  </div>

  <!-- detail panel -->
  <div id="panel">
    <div id="panel-inner">

      <div id="panel-hd">
        <div id="panel-topbar">
          <div class="panel-meta">
            <span id="panel-year"></span>
            <span id="panel-citations"></span>
          </div>
          <button id="close-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
            close
          </button>
        </div>
        <div id="panel-title"></div>
        <div id="panel-tags" class="tags"></div>
      </div>

      <div id="panel-body"></div>

    </div>
  </div>

</div>

<script>
"use strict";

// ── theme ─────────────────────────────────────────────────────────────────
(function () {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.body.classList.add('light');
})();

function setupTheme() {
  const btn = document.getElementById('theme-btn');
  btn.textContent = document.body.classList.contains('light') ? '☀' : '☾';
  btn.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    btn.textContent = isLight ? '☀' : '☾';
  });
}

// ── state ────────────────────────────────────────────────────────────────
let notes      = [];
let byId       = {};
let query      = '';
let activeTags = new Set();
let openId     = null;
let sortBy     = 'title';      // 'title' | 'year' | 'citations'
let activeTab  = 'all';        // 'all' | 'top-cited' | 'by-theme'

// ── refs ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const searchEl       = $('search');
const grid           = $('grid');
const emptyEl        = $('empty');
const resultBar      = $('result-bar');
const headerCount    = $('header-count');
const filterBar      = $('active-filters');
const panel          = $('panel');
const panelYear      = $('panel-year');
const panelCitations = $('panel-citations');
const panelTitle     = $('panel-title');
const panelTags      = $('panel-tags');
const panelBody      = $('panel-body');
const closeBtn       = $('close-btn');

// ── load ─────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('notes.json');
  notes = await res.json();
  notes.forEach(n => { byId[n.id] = n; });
  headerCount.textContent = `${notes.length} notes`;

  // Wire up tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  render();
}

// ── format citation count ─────────────────────────────────────────────────
function fmtCit(n) {
  if (!n) return '';
  return n.toLocaleString();
}

// ── wikilink resolver ────────────────────────────────────────────────────
function resolveWikilinks(html) {
  return html.replace(
    /\[\[([^\]|#]+?)(?:[|#][^\]]*)?\]\]/g,
    (_, ref) => {
      const label = ref.trim();
      const id = label.replace(/\s+/g, '-');
      const exists = byId[id] || byId[label];
      const cls = exists ? 'wikilink' : 'wikilink missing';
      const resolvedId = exists ? (byId[id] ? id : label) : id;
      return `<a href="#" class="${cls}" data-noteid="${resolvedId}">${label}</a>`;
    }
  );
}

// ── filtering + sorting ──────────────────────────────────────────────────
function filteredNotes() {
  const q = query.toLowerCase();
  return notes.filter(n => {
    for (const t of activeTags) {
      if (!n.tags.includes(t)) return false;
    }
    if (!q) return true;
    return (
      n.title.toLowerCase().includes(q) ||
      (n.tldr && n.tldr.toLowerCase().includes(q)) ||
      n.tags.some(t => t.toLowerCase().includes(q))
    );
  });
}

function sortedNotes(arr) {
  const copy = [...arr];
  if (sortBy === 'citations') {
    copy.sort((a, b) => (b.citation_count || 0) - (a.citation_count || 0));
  } else if (sortBy === 'year') {
    copy.sort((a, b) => (b.year || '').localeCompare(a.year || ''));
  } else {
    copy.sort((a, b) => a.title.localeCompare(b.title));
  }
  return copy;
}

// ── categorize for By Theme ──────────────────────────────────────────────
const THEME_ORDER = [
  { key: 'Foundations',            match: n => n.tags.some(t => ['foundational','architecture'].includes(t)) },
  { key: 'State Space Models',     match: n => n.tags.some(t => ['ssm','linear-time','recurrence','mamba','lstm','rnn','linear-attention'].includes(t)) },
  { key: 'Mixture-of-Experts',     match: n => n.tags.some(t => ['moe','routing','sparse'].includes(t)) },
  { key: 'Inference Optimization', match: n => n.tags.some(t => ['inference','speculative-decoding','throughput','draft-model','kv-cache'].includes(t)) },
  { key: 'Hardware & Systems',     match: n => n.tags.some(t => ['hardware','io-awareness','kernel-fusion','gpu','tpu','asic','fpga'].includes(t)) },
  { key: 'Attention & KV',         match: n => n.tags.some(t => ['attention','long-context','compression'].includes(t)) },
  { key: 'Training & RL',          match: n => n.tags.some(t => ['rlhf','rl','post-training','training','reward'].includes(t)) },
  { key: 'Benchmarks',             match: n => n.tags.some(t => ['benchmarks','evaluation'].includes(t)) },
  { key: 'Concepts & Glossary',    match: n => n.tags.includes('glossary') },
  { key: 'Meta',                   match: n => n.tags.some(t => ['index','meta','dashboard'].includes(t)) },
];

function themeOf(n) {
  for (const th of THEME_ORDER) {
    if (th.match(n)) return th.key;
  }
  return 'Other';
}

// ── build a card element ─────────────────────────────────────────────────
function makeCard(n) {
  const card = document.createElement('div');
  card.className = 'card' + (n.id === openId ? ' active' : '');
  card.dataset.id = n.id;

  const tldrRaw = n.tldr || '';
  const tldrHtml = tldrRaw
    ? (typeof marked !== 'undefined'
        ? marked.parseInline(tldrRaw)
        : escHtml(tldrRaw))
    : '<em>No summary yet.</em>';

  const yearHtml = n.year
    ? `<span class="year-badge">${escHtml(n.year)}</span>`
    : '';

  const citHtml = n.citation_count
    ? `<span class="citation-badge">🔖 ${fmtCit(n.citation_count)} citations</span>`
    : '';

  const tagsHtml = n.tags.slice(0, 6).map(t =>
    `<span class="tag${activeTags.has(t) ? ' active-tag' : ''}" data-tag="${escAttr(t)}">${escHtml(t)}</span>`
  ).join('');

  card.innerHTML = `
    <div class="card-top">
      <span class="card-title">${escHtml(n.title)}</span>
      <div class="card-meta">
        ${yearHtml}
        ${citHtml}
      </div>
    </div>
    <p class="card-tldr">${tldrHtml}</p>
    <div class="tags">${tagsHtml}</div>
  `;

  card.querySelectorAll('.tag').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      toggleTag(el.dataset.tag);
    })
  );

  card.addEventListener('click', () => openNote(n.id));
  return card;
}

// ── render filter bar ────────────────────────────────────────────────────
function renderFilters() {
  if (activeTags.size === 0) {
    filterBar.classList.remove('on');
    filterBar.innerHTML = '';
    return;
  }
  filterBar.classList.add('on');

  const label = `<span class="active-filter-label">Active filters:</span>`;
  const pills = [...activeTags].map(t =>
    `<span class="filter-pill" data-tag="${escAttr(t)}">${escHtml(t)}<span class="x">×</span></span>`
  ).join('');
  const clearBtn = `<button class="clear-all-btn" id="clear-all">Clear all filters</button>`;

  filterBar.innerHTML = label + pills + clearBtn;

  filterBar.querySelectorAll('.filter-pill').forEach(el =>
    el.addEventListener('click', () => removeTag(el.dataset.tag))
  );
  filterBar.querySelector('#clear-all').addEventListener('click', clearTags);
}

// ── clear grid (keep #empty) ──────────────────────────────────────────────
function clearGrid() {
  [...grid.children].forEach(c => { if (c !== emptyEl) c.remove(); });
}

// ── RENDER ALL ────────────────────────────────────────────────────────────
function renderAll() {
  const visible = sortedNotes(filteredNotes());
  emptyEl.classList.toggle('show', visible.length === 0);

  // Result bar with sort select
  resultBar.innerHTML = `
    <span>${visible.length} of ${notes.length} notes</span>
    <select class="sort-select" id="sort-select">
      <option value="title"${sortBy === 'title' ? ' selected' : ''}>Sort: Title A–Z</option>
      <option value="year"${sortBy === 'year' ? ' selected' : ''}>Sort: Year (newest)</option>
      <option value="citations"${sortBy === 'citations' ? ' selected' : ''}>Sort: Citations ↓</option>
    </select>
  `;
  document.getElementById('sort-select').addEventListener('change', e => {
    sortBy = e.target.value;
    render();
  });

  clearGrid();
  visible.forEach(n => grid.insertBefore(makeCard(n), emptyEl));
  renderFilters();
}

// ── RENDER TOP CITED ──────────────────────────────────────────────────────
function renderTopCited() {
  const q = query.toLowerCase();
  let cited = notes.filter(n => n.citation_count > 0);
  if (q) {
    cited = cited.filter(n =>
      n.title.toLowerCase().includes(q) ||
      (n.tldr && n.tldr.toLowerCase().includes(q)) ||
      n.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  cited.sort((a, b) => (b.citation_count || 0) - (a.citation_count || 0));

  resultBar.innerHTML = `<span>${cited.length} papers with citation data</span>`;
  emptyEl.classList.toggle('show', cited.length === 0);

  clearGrid();

  const list = document.createElement('div');
  list.className = 'ranked-list';

  cited.forEach((n, i) => {
    const rank = i + 1;
    const numClass = rank === 1 ? ' gold' : rank === 2 ? ' silver' : rank === 3 ? ' bronze' : '';
    const item = document.createElement('div');
    item.className = 'ranked-item';
    item.innerHTML = `
      <span class="ranked-num${numClass}">#${rank}</span>
      <div class="ranked-info">
        <div class="ranked-title">${escHtml(n.title)}</div>
        <div class="ranked-meta">${n.year ? escHtml(n.year) : '—'}</div>
      </div>
      <span class="ranked-count">${fmtCit(n.citation_count)} citations</span>
    `;
    item.addEventListener('click', () => openNote(n.id));
    list.appendChild(item);
  });

  grid.insertBefore(list, emptyEl);
}

// ── RENDER BY THEME ───────────────────────────────────────────────────────
function renderByTheme() {
  const visible = filteredNotes();

  resultBar.innerHTML = `<span>${visible.length} of ${notes.length} notes</span>`;
  emptyEl.classList.toggle('show', visible.length === 0);

  clearGrid();

  // Group by theme
  const groups = {};
  visible.forEach(n => {
    const theme = themeOf(n);
    if (!groups[theme]) groups[theme] = [];
    groups[theme].push(n);
  });

  // Render in fixed theme order
  const renderedThemes = new Set();
  THEME_ORDER.forEach(th => {
    if (!groups[th.key] || groups[th.key].length === 0) return;
    renderedThemes.add(th.key);

    const section = document.createElement('div');
    section.className = 'theme-section';

    const heading = document.createElement('div');
    heading.className = 'theme-heading';
    heading.innerHTML = `${escHtml(th.key)}<span class="theme-count">(${groups[th.key].length})</span>`;
    section.appendChild(heading);

    const themeGrid = document.createElement('div');
    themeGrid.className = 'theme-grid';
    groups[th.key].forEach(n => themeGrid.appendChild(makeCard(n)));
    section.appendChild(themeGrid);

    grid.insertBefore(section, emptyEl);
  });

  // Catch-all for 'Other'
  if (groups['Other'] && groups['Other'].length > 0) {
    const section = document.createElement('div');
    section.className = 'theme-section';

    const heading = document.createElement('div');
    heading.className = 'theme-heading';
    heading.innerHTML = `Other<span class="theme-count">(${groups['Other'].length})</span>`;
    section.appendChild(heading);

    const themeGrid = document.createElement('div');
    themeGrid.className = 'theme-grid';
    groups['Other'].forEach(n => themeGrid.appendChild(makeCard(n)));
    section.appendChild(themeGrid);

    grid.insertBefore(section, emptyEl);
  }

  renderFilters();
}

// ── MAIN RENDER DISPATCH ──────────────────────────────────────────────────
function render() {
  if (activeTab === 'top-cited') {
    renderTopCited();
  } else if (activeTab === 'by-theme') {
    renderByTheme();
  } else {
    renderAll();
  }
}

// ── open panel ───────────────────────────────────────────────────────────
function openNote(id) {
  const n = byId[id];
  if (!n) return;

  openId = id;
  panelYear.textContent = n.year || '';

  // Citation display in panel
  if (n.citation_count) {
    panelCitations.textContent = `📚 ${fmtCit(n.citation_count)} citations`;
    panelCitations.style.display = 'inline-block';
  } else {
    panelCitations.style.display = 'none';
  }

  panelTitle.textContent = n.title;

  panelTags.innerHTML = n.tags.map(t =>
    `<span class="tag${activeTags.has(t) ? ' active-tag' : ''}" data-tag="${escAttr(t)}">${escHtml(t)}</span>`
  ).join('');
  panelTags.querySelectorAll('.tag').forEach(el =>
    el.addEventListener('click', () => toggleTag(el.dataset.tag))
  );

  panelBody.innerHTML = resolveWikilinks(n.html);
  panelBody.querySelectorAll('a.wikilink:not(.missing)').forEach(a =>
    a.addEventListener('click', e => {
      e.preventDefault();
      openNote(a.dataset.noteid);
    })
  );

  renderMath(panelBody);

  panel.classList.add('open');
  panelBody.scrollTop = 0;
  render();
}

// ── KaTeX renderer ───────────────────────────────────────────────────────
function renderMath(el) {
  if (typeof renderMathInElement !== 'function') return;
  renderMathInElement(el, {
    delimiters: [
      { left: '$$', right: '$$', display: true  },
      { left: '$',  right: '$',  display: false },
      { left: '\\(', right: '\\)', display: false },
      { left: '\\[', right: '\\]', display: true  }
    ],
    throwOnError: false
  });
}

function closePanel() {
  panel.classList.remove('open');
  openId = null;
  render();
}

// ── tag toggle ───────────────────────────────────────────────────────────
function toggleTag(tag) {
  if (!tag) return;
  if (activeTags.has(tag)) activeTags.delete(tag);
  else                     activeTags.add(tag);
  render();
}

function removeTag(tag) {
  activeTags.delete(tag);
  render();
}

function clearTags() {
  activeTags.clear();
  render();
}

// ── utils ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

// ── events ────────────────────────────────────────────────────────────────
searchEl.addEventListener('input', () => {
  query = searchEl.value.trim();
  render();
});

closeBtn.addEventListener('click', closePanel);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchEl.focus();
    searchEl.select();
  }
});

setupTheme();
init();
</script>
</body>
</html>
