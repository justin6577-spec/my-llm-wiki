<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Wiki</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d1117;
      --surface:     #161b22;
      --surface2:    #1c2128;
      --border:      #30363d;
      --text:        #e6edf3;
      --muted:       #8b949e;
      --accent:      #7c3aed;
      --accent-lt:   #a78bfa;
      --accent-dim:  rgba(124,58,237,.14);
      --accent-ring: rgba(124,58,237,.45);
      --tag-bg:      rgba(124,58,237,.18);
      --panel-w:     540px;
      --bg-glass:    rgba(13,17,23,.90);
      --code-color:  #e3b341;
      --bq-color:    #b8a0e8;
    }

    body.light {
      --bg:          #ffffff;
      --surface:     #f6f8fa;
      --surface2:    #eaeef2;
      --border:      #d0d7de;
      --text:        #1c2128;
      --muted:       #57606a;
      --accent-lt:   #6d28d9;
      --accent-dim:  rgba(124,58,237,.08);
      --accent-ring: rgba(124,58,237,.25);
      --tag-bg:      rgba(124,58,237,.08);
      --bg-glass:    rgba(255,255,255,.92);
      --code-color:  #b45309;
      --bq-color:    #6d28d9;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
      transition: background .2s ease, color .2s ease;
    }

    /* ── SITE NAV ───────────────────────────────────────────────────── */
    .site-nav {
      display: flex; align-items: stretch; gap: 2px;
      height: 100%; flex-shrink: 0;
    }

    .site-nav a {
      display: flex; align-items: center;
      text-decoration: none;
      color: var(--muted); font-size: .82rem; font-weight: 500;
      padding: 0 13px; position: relative;
      transition: color .12s;
    }

    .site-nav a:hover { color: var(--text); }
    .site-nav a.active { color: var(--text); }

    .site-nav a.active::after {
      content: '';
      position: absolute; bottom: 0; left: 13px; right: 13px;
      height: 2px; background: var(--accent);
      border-radius: 1px 1px 0 0;
    }

    /* ── HEADER ─────────────────────────────────────────────────────── */
    header {
      position: sticky; top: 0; z-index: 200;
      background: var(--bg-glass);
      backdrop-filter: blur(14px) saturate(1.4);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex; align-items: center; gap: 18px;
    }

    .brand { flex-shrink: 0; }

    .brand-title {
      font-size: 1.15rem; font-weight: 700; letter-spacing: -.03em;
      color: var(--text);
    }
    .brand-title .dot { color: var(--accent-lt); }

    .brand-sub {
      font-size: .72rem; color: var(--muted); margin-top: 1px;
      letter-spacing: .01em;
    }

    .search-wrap {
      flex: 1; max-width: 440px; position: relative;
    }

    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 34px;
      color: var(--text); font-size: .875rem;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    #search::placeholder { color: var(--muted); }

    .kbd {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      font-size: .65rem; color: var(--muted);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; pointer-events: none;
    }

    /* active filter bar */
    #active-filters {
      display: none; flex-wrap: wrap; align-items: center; gap: 6px;
      margin-bottom: 14px;
    }
    #active-filters.on { display: flex; }

    .active-filter-label {
      font-size: .72rem; color: var(--muted); margin-right: 2px;
    }

    .filter-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border: 1px solid var(--accent);
      border-radius: 20px; padding: 4px 10px;
      font-size: .72rem; font-weight: 600;
      cursor: pointer;
      transition: background .12s;
    }
    .filter-pill:hover { background: #6d28d9; border-color: #6d28d9; }

    .filter-pill .x {
      display: inline-flex; align-items: center; justify-content: center;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,.22);
      font-size: .65rem; line-height: 1;
    }

    .clear-all-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px; padding: 3px 11px;
      font-size: .7rem; cursor: pointer;
      transition: color .12s, border-color .12s;
    }
    .clear-all-btn:hover { color: var(--text); border-color: var(--muted); }

    .header-count {
      margin-left: auto; font-size: .75rem; color: var(--muted);
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── THEME TOGGLE ────────────────────────────────────────────────── */
    .theme-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; line-height: 1;
      cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    .theme-btn:hover { border-color: var(--muted); color: var(--text); }

    /* ── LAYOUT ─────────────────────────────────────────────────────── */
    #app {
      display: flex;
      height: calc(100vh - 64px);
    }

    /* ── GRID PANE ───────────────────────────────────────────────────── */
    #grid-pane {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── BROWSE AREA (wraps result-bar, filters, grid) ─────────────── */
    #browse-area {
      flex: 1; overflow-y: auto; padding: 24px;
    }

    /* ── TAB BAR ─────────────────────────────────────────────────────── */
    .tab-bar {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      background: none; border: none;
      color: var(--muted); font-size: .83rem; font-weight: 500;
      padding: 8px 16px; cursor: pointer;
      position: relative;
      transition: color .12s;
    }
    .tab-btn:hover { color: var(--text); }

    .tab-btn.active { color: var(--text); }

    .tab-btn.active::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: var(--accent);
      border-radius: 1px 1px 0 0;
    }

    /* ── RESULT BAR ──────────────────────────────────────────────────── */
    #result-bar {
      font-size: .75rem; color: var(--muted); margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }

    /* ── SORT SELECT ─────────────────────────────────────────────────── */
    .sort-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: .73rem;
      cursor: pointer;
      margin-left: auto;
      outline: none;
      transition: border-color .12s;
    }
    .sort-select:hover { border-color: var(--muted); color: var(--text); }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 13px;
    }

    /* ── CARD ────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 17px 18px;
      cursor: pointer; display: flex; flex-direction: column; gap: 10px;
      transition: border-color .15s, box-shadow .15s, transform .1s;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 6px 24px rgba(124,58,237,.1);
      transform: translateY(-2px);
    }

    .card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
    }

    .card-title {
      font-size: .93rem; font-weight: 600; line-height: 1.4; color: var(--text);
    }

    /* ── CARD META (year + citation stacked) ─────────────────────────── */
    .card-meta {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px;
      flex-shrink: 0;
    }

    .year-badge {
      flex-shrink: 0;
      font-size: .68rem; font-weight: 700;
      color: var(--accent-lt);
      background: var(--accent-dim);
      border: 1px solid var(--accent-ring);
      border-radius: 4px; padding: 2px 7px;
    }

    /* ── CITATION BADGE (card) ───────────────────────────────────────── */
    .citation-badge {
      display: inline-block;
      font-size: .63rem; font-weight: 600;
      color: var(--accent-lt);
      background: var(--tag-bg);
      border: 1px solid var(--accent-ring);
      border-radius: 10px; padding: 1px 7px;
      white-space: nowrap;
    }

    .card-tldr {
      font-size: .81rem; color: var(--muted); line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tldr em { font-style: italic; opacity: .6; }

    /* ── TAGS ────────────────────────────────────────────────────────── */
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }

    .tag {
      font-size: .68rem; color: var(--accent-lt);
      background: transparent;
      border: 1px solid var(--accent-ring);
      border-radius: 12px; padding: 2px 9px;
      cursor: pointer; user-select: none;
      transition: background .12s, color .12s, border-color .12s;
    }
    .tag:hover { background: var(--accent-dim); }
    .tag.active-tag {
      background: var(--accent); color: #fff;
      border-color: var(--accent);
    }
    .tag.active-tag:hover { background: #6d28d9; border-color: #6d28d9; }

    /* ── EMPTY STATE ─────────────────────────────────────────────────── */
    #empty {
      display: none; grid-column: 1/-1;
      text-align: center; padding: 80px 20px; color: var(--muted);
    }
    #empty.show { display: block; }
    #empty svg { opacity: .25; margin-bottom: 14px; }
    #empty p { font-size: .9rem; }

    /* ── BY THEME (By Theme tab) ─────────────────────────────────────── */
    .theme-section {
      grid-column: 1 / -1;
      margin-bottom: 28px;
    }

    .theme-heading {
      font-size: .78rem; font-weight: 700; color: var(--muted);
      letter-spacing: .07em; text-transform: uppercase;
      margin-bottom: 12px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .theme-heading .theme-count {
      font-weight: 400; font-size: .72rem; margin-left: 6px;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 13px;
    }

    /* ── DETAIL PANEL ────────────────────────────────────────────────── */
    #panel {
      flex-shrink: 0;
      width: 0; overflow: hidden;
      border-left: 1px solid transparent;
      background: var(--surface);
      display: flex; flex-direction: column;
      transition: width .22s cubic-bezier(.4,0,.2,1),
                  border-color .22s;
    }

    #panel.open {
      width: var(--panel-w);
      border-left-color: var(--border);
    }

    #panel-inner {
      width: var(--panel-w); height: 100%;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* panel header */
    #panel-hd {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #panel-topbar {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }

    .panel-meta {
      display: flex; align-items: center; gap: 8px;
    }

    #panel-year {
      font-size: .72rem; font-weight: 700; color: var(--accent-lt);
      letter-spacing: .04em;
    }

    /* ── PANEL CITATION ──────────────────────────────────────────────── */
    #panel-citations {
      display: none;
      font-size: .7rem; font-weight: 600;
      color: var(--accent-lt);
      background: var(--tag-bg);
      border: 1px solid var(--accent-ring);
      border-radius: 4px; padding: 1px 8px;
    }

    #close-btn {
      display: flex; align-items: center; gap: 5px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 4px 11px; font-size: .75rem; cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    #close-btn:hover { border-color: var(--muted); color: var(--text); }

    #panel-title {
      font-size: 1.05rem; font-weight: 700; line-height: 1.4;
      color: var(--text); margin-bottom: 10px;
    }

    /* panel body */
    #panel-body {
      flex: 1; overflow-y: auto; padding: 24px 22px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    /* prose */
    #panel-body h1 { display: none; }

    #panel-body h2 {
      font-size: .97rem; font-weight: 700; color: var(--text);
      margin: 26px 0 10px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    #panel-body h3 {
      font-size: .88rem; font-weight: 600; color: var(--text);
      margin: 18px 0 7px;
    }

    #panel-body p {
      font-size: .855rem; color: var(--muted);
      margin-bottom: 13px; line-height: 1.75;
    }

    #panel-body ul, #panel-body ol {
      padding-left: 18px; margin-bottom: 13px;
    }

    #panel-body li {
      font-size: .855rem; color: var(--muted);
      margin-bottom: 5px; line-height: 1.7;
    }

    #panel-body blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-dim);
      border-radius: 0 6px 6px 0;
      padding: 9px 15px; margin: 14px 0;
    }

    #panel-body blockquote p {
      color: var(--bq-color); margin: 0;
      font-size: .83rem; font-style: italic; line-height: 1.6;
    }

    #panel-body code {
      font-family: 'JetBrains Mono','Fira Code','Cascadia Code',monospace;
      font-size: .8rem; color: var(--code-color);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
    }

    #panel-body pre {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; overflow-x: auto; margin: 12px 0;
    }

    #panel-body pre code {
      background: none; border: none; padding: 0; color: var(--text);
    }

    #panel-body table {
      width: 100%; border-collapse: collapse;
      font-size: .8rem; margin: 14px 0;
    }

    #panel-body th {
      background: var(--surface2); color: var(--text);
      font-weight: 600; padding: 7px 10px;
      border: 1px solid var(--border); text-align: left;
    }

    #panel-body td {
      padding: 7px 10px; border: 1px solid var(--border);
      color: var(--muted); vertical-align: top;
    }

    #panel-body tr:nth-child(even) td { background: rgba(255,255,255,.02); }

    /* obsidian-only blocks (dataview / mermaid / embeds) */
    .obsidian-note {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      font-size: 13px;
      font-style: italic;
      color: var(--muted);
      border-radius: 4px;
      margin: 8px 0;
    }

    /* wikilinks inside panel */
    .wikilink {
      color: var(--accent-lt); text-decoration: none;
      border-bottom: 1px solid rgba(167,139,250,.35);
      transition: color .12s, border-color .12s;
    }
    .wikilink:hover { color: #c4b5fd; border-bottom-color: #c4b5fd; }
    .wikilink.missing { color: var(--muted); border-bottom-style: dashed; }

    /* ── SCROLLBARS ──────────────────────────────────────────────────── */
    #browse-area::-webkit-scrollbar,
    #panel-body::-webkit-scrollbar { width: 5px; }
    #browse-area::-webkit-scrollbar-track,
    #panel-body::-webkit-scrollbar-track { background: transparent; }
    #browse-area::-webkit-scrollbar-thumb,
    #panel-body::-webkit-scrollbar-thumb {
      background: var(--border); border-radius: 3px;
    }

    /* ── CITATION EXPLORER ───────────────────────────────────────────── */
    #ce-explorer {
      display: none;
      flex: 1;
      overflow: hidden;
    }

    .ce-wrap {
      display: flex;
      height: 100%;
      overflow: hidden;
    }

    /* Left panel */
    .ce-left {
      width: 35%;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .ce-hd {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ce-hd-title {
      font-size: .95rem; font-weight: 700; color: var(--text);
      margin-bottom: 3px;
    }

    .ce-hd-sub {
      font-size: .72rem; color: var(--muted);
      margin-bottom: 10px; line-height: 1.4;
    }

    .ce-search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text); font-size: .82rem;
      outline: none;
      transition: border-color .15s;
    }
    .ce-search:focus { border-color: var(--accent); }
    .ce-search::placeholder { color: var(--muted); }

    .ce-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .ce-list::-webkit-scrollbar { width: 4px; }
    .ce-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .ce-item {
      display: flex; align-items: center;
      padding: 9px 18px; gap: 10px;
      cursor: pointer;
      transition: background .1s;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    body.light .ce-item { border-bottom-color: rgba(0,0,0,.04); }

    .ce-item:hover { background: var(--surface2); }
    .ce-item.active { background: var(--accent-dim); border-left: 2px solid var(--accent); }
    .ce-item:not(.active) { border-left: 2px solid transparent; }

    .ce-rank {
      font-size: .7rem; font-weight: 700;
      color: var(--muted); min-width: 22px;
      text-align: right; flex-shrink: 0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    .ce-info { flex: 1; min-width: 0; }

    .ce-item-title {
      font-size: .82rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .ce-item-year {
      font-size: .67rem; color: var(--muted);
    }

    .ce-bar-wrap {
      width: 72px; flex-shrink: 0;
    }

    .ce-bar-track {
      background: var(--surface2);
      border-radius: 3px; height: 4px;
      margin-bottom: 2px; overflow: hidden;
    }
    body.light .ce-bar-track { background: var(--border); }

    .ce-bar-fill {
      height: 100%; border-radius: 3px;
      min-width: 4px;
      transition: width .25s ease;
    }
    .ce-bar-fill.purple { background: var(--accent); }
    .ce-bar-fill.teal   { background: #0d9488; }
    .ce-bar-fill.blue   { background: #2563eb; }
    .ce-bar-fill.gray   { background: #6b7280; }

    .ce-bar-num {
      font-size: .62rem; color: var(--muted);
      text-align: right;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }

    /* Right panel */
    .ce-right {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .ce-right::-webkit-scrollbar { width: 5px; }
    .ce-right::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Summary view */
    .ce-summary-title {
      font-size: 1.1rem; font-weight: 700; color: var(--text);
      margin-bottom: 6px;
    }

    .ce-summary-sub {
      font-size: .82rem; color: var(--muted); margin-bottom: 22px;
    }

    .ce-summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }

    .ce-stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }

    .ce-stat-label {
      font-size: .68rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em;
      margin-bottom: 5px;
    }

    .ce-stat-value {
      font-size: 1.15rem; font-weight: 700; color: var(--text);
      line-height: 1.2;
    }

    .ce-stat-sub {
      font-size: .72rem; color: var(--muted);
      margin-top: 3px;
    }

    .ce-clusters-label {
      font-size: .8rem; font-weight: 600; color: var(--text);
      margin-bottom: 10px;
    }

    .ce-cluster-pills {
      display: flex; flex-wrap: wrap; gap: 8px;
    }

    .ce-cluster-pill {
      font-size: .75rem; font-weight: 600;
      padding: 5px 14px; border-radius: 20px;
      cursor: default;
      border: 1px solid;
    }

    /* Detail view */
    .ce-back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 5px 12px; font-size: .75rem; cursor: pointer;
      margin-bottom: 20px;
      transition: border-color .12s, color .12s;
    }
    .ce-back-btn:hover { border-color: var(--muted); color: var(--text); }

    .ce-detail-title {
      font-size: 1.25rem; font-weight: 700; color: var(--text);
      line-height: 1.3; margin-bottom: 10px;
    }

    .ce-detail-meta {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--muted);
      margin-bottom: 16px;
    }

    .ce-meta-sep { color: var(--border); }

    .ce-arxiv-link {
      color: var(--accent-lt); text-decoration: none; font-size: .75rem;
      padding: 2px 8px; border: 1px solid var(--accent-ring);
      border-radius: 4px; transition: background .12s;
    }
    .ce-arxiv-link:hover { background: var(--accent-dim); }

    .ce-total-cit {
      font-size: 2.2rem; font-weight: 700; color: var(--text);
      letter-spacing: -.02em;
    }

    .ce-total-label {
      font-size: .73rem; color: var(--muted); margin-bottom: 10px;
    }

    .ce-full-bar {
      height: 7px; border-radius: 4px;
      margin-bottom: 28px;
      min-width: 4px;
      max-width: 100%;
    }

    .ce-section {
      margin-top: 28px;
    }

    .ce-section-title {
      font-size: .88rem; font-weight: 700; color: var(--text);
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .ce-tldr {
      font-size: .855rem; color: var(--muted);
      line-height: 1.75;
    }

    /* Citing papers table */
    .cite-table {
      width: 100%; border-collapse: collapse;
      font-size: .78rem;
    }

    .cite-table th {
      background: var(--surface2); color: var(--muted);
      font-size: .65rem; font-weight: 600; letter-spacing: .06em;
      text-transform: uppercase;
      padding: 6px 10px; border: 1px solid var(--border);
      text-align: left;
    }

    .cite-table td {
      padding: 8px 10px; border: 1px solid var(--border);
      color: var(--muted); vertical-align: middle;
    }

    .cite-table tr:hover td { background: var(--surface2); }

    .cite-rank {
      font-weight: 700; color: var(--muted);
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: .72rem; text-align: center; width: 28px;
    }

    .cite-title-link {
      color: var(--accent-lt); font-weight: 500;
      cursor: pointer; text-decoration: none;
      border-bottom: 1px solid rgba(167,139,250,.3);
      transition: color .12s;
      background: none; border-top: none; border-left: none; border-right: none;
      padding: 0; font-size: .78rem; font-family: inherit;
    }
    .cite-title-link:hover { color: #c4b5fd; }

    .cite-count { font-weight: 600; color: var(--text); white-space: nowrap; }
    .cite-year  { color: var(--muted); white-space: nowrap; }

    /* Theme badge pills */
    .theme-pill {
      display: inline-block;
      font-size: .6rem; font-weight: 600; text-transform: uppercase;
      padding: 1px 6px; border-radius: 8px;
      letter-spacing: .04em; white-space: nowrap;
    }
    .theme-pill.vision       { background: rgba(37,99,235,.18);  color: #60a5fa; border: 1px solid rgba(37,99,235,.35); }
    .theme-pill.hardware     { background: rgba(234,88,12,.18);  color: #fb923c; border: 1px solid rgba(234,88,12,.35); }
    .theme-pill.inference    { background: rgba(13,148,136,.18); color: #2dd4bf; border: 1px solid rgba(13,148,136,.35); }
    .theme-pill.llm          { background: rgba(124,58,237,.18); color: #a78bfa; border: 1px solid rgba(124,58,237,.35); }
    .theme-pill.medical      { background: rgba(220,38,38,.18);  color: #f87171; border: 1px solid rgba(220,38,38,.35); }
    .theme-pill.foundations  { background: rgba(107,114,128,.18);color: #9ca3af; border: 1px solid rgba(107,114,128,.35); }
    .theme-pill.theory       { background: rgba(16,185,129,.18); color: #34d399; border: 1px solid rgba(16,185,129,.35); }
    .theme-pill.scaling      { background: rgba(245,158,11,.18); color: #fbbf24; border: 1px solid rgba(245,158,11,.35); }
    .theme-pill.efficiency   { background: rgba(99,102,241,.18); color: #818cf8; border: 1px solid rgba(99,102,241,.35); }
    .theme-pill.architecture { background: rgba(236,72,153,.18); color: #f472b6; border: 1px solid rgba(236,72,153,.35); }
    .theme-pill.tokenization { background: rgba(5,150,105,.18);  color: #10b981; border: 1px solid rgba(5,150,105,.35); }
    .theme-pill.time-series  { background: rgba(139,92,246,.18); color: #a78bfa; border: 1px solid rgba(139,92,246,.35); }
    .theme-pill.survey       { background: rgba(156,163,175,.18);color: #9ca3af; border: 1px solid rgba(156,163,175,.35); }
    .theme-pill.ssm          { background: rgba(20,184,166,.18); color: #2dd4bf; border: 1px solid rgba(20,184,136,.35); }
    .theme-pill.application  { background: rgba(244,114,182,.18);color: #f472b6; border: 1px solid rgba(244,114,182,.35); }

    /* arXiv link */
    .cite-arxiv {
      color: var(--muted); text-decoration: none;
      font-size: .75rem; transition: color .12s;
    }
    .cite-arxiv:hover { color: var(--accent-lt); }

    .cite-no-data {
      font-size: .83rem; color: var(--muted);
      font-style: italic; padding: 10px 0;
    }

    /* Related pills */
    .related-pills {
      display: flex; flex-wrap: wrap; gap: 7px;
    }

    .related-pill {
      font-size: .75rem; font-weight: 500;
      color: var(--accent-lt);
      background: var(--accent-dim);
      border: 1px solid var(--accent-ring);
      border-radius: 20px; padding: 4px 12px;
      cursor: pointer; text-decoration: none;
      transition: background .12s;
    }
    .related-pill:hover { background: rgba(124,58,237,.25); }

    .ce-empty {
      padding: 40px 20px; text-align: center; color: var(--muted);
      font-size: .88rem;
    }

    /* ── MOBILE ──────────────────────────────────────────────────────── */
    @media (max-width: 720px) {
      header { padding: 0 16px; flex-wrap: wrap; height: auto; padding: 10px 16px; gap: 10px; }
      .kbd { display: none; }
      .header-count { display: none; }
      .search-wrap { order: 3; max-width: 100%; flex-basis: 100%; }

      #app { flex-direction: column; height: auto; min-height: calc(100vh - 80px); }
      #browse-area { overflow: visible; }
      #panel {
        width: 100% !important;
        border-left: none !important;
        border-top: 1px solid transparent;
        max-height: 0;
        transition: max-height .3s ease, border-color .3s;
      }
      #panel.open { max-height: 80vh; border-top-color: var(--border); }
      #panel-inner { width: 100%; }

      #ce-explorer { flex: none; height: 80vh; }
      .ce-wrap { flex-direction: column; height: 100%; }
      .ce-left { width: 100%; height: 40%; border-right: none; border-bottom: 1px solid var(--border); }
      .ce-right { padding: 16px 18px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────────────────────────── -->
<header>
  <div class="brand">
    <div class="brand-title">LLM Wiki<span class="dot">.</span></div>
    <div class="brand-sub">AI research knowledge base — papers, concepts &amp; intuitions · Curated by Saqlain</div>
  </div>

  <nav class="site-nav">
    <a href="index.html" class="active">Browse notes</a>
    <a href="graph.html">Knowledge graph</a>
  </nav>

  <div class="search-wrap">
    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2.2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text"
           placeholder="Search titles, summaries, tags…"
           autocomplete="off" spellcheck="false">
    <span class="kbd">⌘K</span>
  </div>

  <div class="header-count" id="header-count"></div>
  <button id="theme-btn" class="theme-btn" aria-label="Toggle theme" title="Toggle light/dark mode">☾</button>
</header>

<!-- ── APP ───────────────────────────────────────────────────────────────── -->
<div id="app">

  <!-- grid pane -->
  <div id="grid-pane">

    <!-- tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="all">All</button>
      <button class="tab-btn" data-tab="top-cited">Citation Explorer</button>
      <button class="tab-btn" data-tab="by-theme">By Theme</button>
    </div>

    <!-- normal browse area -->
    <div id="browse-area">
      <div id="result-bar"></div>
      <div id="active-filters"></div>
      <div id="grid">
        <div id="empty">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.3">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <p>No notes match your search.</p>
        </div>
      </div>
    </div>

    <!-- citation explorer (shown when top-cited tab active) -->
    <div id="ce-explorer">
      <div class="ce-wrap">
        <div class="ce-left" id="ce-left"></div>
        <div class="ce-right" id="ce-right"></div>
      </div>
    </div>

  </div>

  <!-- detail panel -->
  <div id="panel">
    <div id="panel-inner">

      <div id="panel-hd">
        <div id="panel-topbar">
          <div class="panel-meta">
            <span id="panel-year"></span>
            <span id="panel-citations"></span>
          </div>
          <button id="close-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.5">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
            close
          </button>
        </div>
        <div id="panel-title"></div>
        <div id="panel-tags" class="tags"></div>
      </div>

      <div id="panel-body"></div>

    </div>
  </div>

</div>

<script>
"use strict";

// ── theme ─────────────────────────────────────────────────────────────────
(function () {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') document.body.classList.add('light');
})();

function setupTheme() {
  const btn = document.getElementById('theme-btn');
  btn.textContent = document.body.classList.contains('light') ? '☀' : '☾';
  btn.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    btn.textContent = isLight ? '☀' : '☾';
  });
}

// ── state ────────────────────────────────────────────────────────────────
let notes      = [];
let byId       = {};
let byArxiv    = {};
let query      = '';
let activeTags = new Set();
let openId     = null;
let sortBy     = 'title';
let activeTab  = 'all';
let ceSelectedId = null;
let ceQuery      = '';

// ── refs ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const searchEl       = $('search');
const grid           = $('grid');
const emptyEl        = $('empty');
const resultBar      = $('result-bar');
const headerCount    = $('header-count');
const filterBar      = $('active-filters');
const panel          = $('panel');
const panelYear      = $('panel-year');
const panelCitations = $('panel-citations');
const panelTitle     = $('panel-title');
const panelTags      = $('panel-tags');
const panelBody      = $('panel-body');
const closeBtn       = $('close-btn');
const browseArea     = $('browse-area');
const ceExplorer     = $('ce-explorer');
const ceLeft         = $('ce-left');
const ceRight        = $('ce-right');

// ── load ─────────────────────────────────────────────────────────────────
async function init() {
  const res = await fetch('notes.json');
  notes = await res.json();
  notes.forEach(n => {
    byId[n.id] = n;
    if (n.arxiv) byArxiv[n.arxiv] = n;
  });
  headerCount.textContent = `${notes.length} notes`;

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTab = btn.dataset.tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  render();
}

// ── format citation count ─────────────────────────────────────────────────
function fmtCit(n) {
  if (!n) return '';
  return n.toLocaleString();
}

function fmtCitShort(n) {
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
  return String(n);
}

// ── citation bar color class ──────────────────────────────────────────────
function citBarClass(n) {
  if (n >= 10000) return 'purple';
  if (n >= 1000)  return 'teal';
  if (n >= 100)   return 'blue';
  return 'gray';
}

// ── citation bar hex color ────────────────────────────────────────────────
function citBarHex(n) {
  if (n >= 10000) return '#7c3aed';
  if (n >= 1000)  return '#0d9488';
  if (n >= 100)   return '#2563eb';
  return '#6b7280';
}

// ── wikilink resolver ────────────────────────────────────────────────────
function resolveWikilinks(html) {
  return html.replace(
    /\[\[([^\]|#]+?)(?:[|#][^\]]*)?\]\]/g,
    (_, ref) => {
      const label = ref.trim();
      const id = label.replace(/\s+/g, '-');
      const exists = byId[id] || byId[label];
      const cls = exists ? 'wikilink' : 'wikilink missing';
      const resolvedId = exists ? (byId[id] ? id : label) : id;
      return `<a href="#" class="${cls}" data-noteid="${resolvedId}">${label}</a>`;
    }
  );
}

// ── filtering + sorting ──────────────────────────────────────────────────
function filteredNotes() {
  const q = query.toLowerCase();
  return notes.filter(n => {
    for (const t of activeTags) {
      if (!n.tags.includes(t)) return false;
    }
    if (!q) return true;
    return (
      n.title.toLowerCase().includes(q) ||
      (n.tldr && n.tldr.toLowerCase().includes(q)) ||
      n.tags.some(t => t.toLowerCase().includes(q))
    );
  });
}

function sortedNotes(arr) {
  const copy = [...arr];
  if (sortBy === 'citations') {
    copy.sort((a, b) => (b.citation_count || 0) - (a.citation_count || 0));
  } else if (sortBy === 'year') {
    copy.sort((a, b) => (b.year || '').localeCompare(a.year || ''));
  } else {
    copy.sort((a, b) => a.title.localeCompare(b.title));
  }
  return copy;
}

// ── categorize for By Theme ──────────────────────────────────────────────
const THEME_ORDER = [
  { key: 'Foundations',            match: n => n.tags.some(t => ['foundational','architecture'].includes(t)) },
  { key: 'State Space Models',     match: n => n.tags.some(t => ['ssm','linear-time','recurrence','mamba','lstm','rnn','linear-attention'].includes(t)) },
  { key: 'Mixture-of-Experts',     match: n => n.tags.some(t => ['moe','routing','sparse'].includes(t)) },
  { key: 'Inference Optimization', match: n => n.tags.some(t => ['inference','speculative-decoding','throughput','draft-model','kv-cache'].includes(t)) },
  { key: 'Hardware & Systems',     match: n => n.tags.some(t => ['hardware','io-awareness','kernel-fusion','gpu','tpu','asic','fpga'].includes(t)) },
  { key: 'Attention & KV',         match: n => n.tags.some(t => ['attention','long-context','compression'].includes(t)) },
  { key: 'Training & RL',          match: n => n.tags.some(t => ['rlhf','rl','post-training','training','reward'].includes(t)) },
  { key: 'Benchmarks',             match: n => n.tags.some(t => ['benchmarks','evaluation'].includes(t)) },
  { key: 'Concepts & Glossary',    match: n => n.tags.includes('glossary') },
  { key: 'Meta',                   match: n => n.tags.some(t => ['index','meta','dashboard'].includes(t)) },
];

function themeOf(n) {
  for (const th of THEME_ORDER) {
    if (th.match(n)) return th.key;
  }
  return 'Other';
}

// ── build a card element ─────────────────────────────────────────────────
function makeCard(n) {
  const card = document.createElement('div');
  card.className = 'card' + (n.id === openId ? ' active' : '');
  card.dataset.id = n.id;

  const tldrRaw = n.tldr || '';
  const tldrHtml = tldrRaw
    ? (typeof marked !== 'undefined'
        ? marked.parseInline(tldrRaw)
        : escHtml(tldrRaw))
    : '<em>No summary yet.</em>';

  const yearHtml = n.year
    ? `<span class="year-badge">${escHtml(n.year)}</span>`
    : '';

  const citHtml = n.citation_count
    ? `<span class="citation-badge">🔖 ${fmtCit(n.citation_count)} citations</span>`
    : '';

  const tagsHtml = n.tags.slice(0, 6).map(t =>
    `<span class="tag${activeTags.has(t) ? ' active-tag' : ''}" data-tag="${escAttr(t)}">${escHtml(t)}</span>`
  ).join('');

  card.innerHTML = `
    <div class="card-top">
      <span class="card-title">${escHtml(n.title)}</span>
      <div class="card-meta">
        ${yearHtml}
        ${citHtml}
      </div>
    </div>
    <p class="card-tldr">${tldrHtml}</p>
    <div class="tags">${tagsHtml}</div>
  `;

  card.querySelectorAll('.tag').forEach(el =>
    el.addEventListener('click', e => {
      e.stopPropagation();
      toggleTag(el.dataset.tag);
    })
  );

  card.addEventListener('click', () => openNote(n.id));
  return card;
}

// ── render filter bar ────────────────────────────────────────────────────
function renderFilters() {
  if (activeTags.size === 0) {
    filterBar.classList.remove('on');
    filterBar.innerHTML = '';
    return;
  }
  filterBar.classList.add('on');

  const label = `<span class="active-filter-label">Active filters:</span>`;
  const pills = [...activeTags].map(t =>
    `<span class="filter-pill" data-tag="${escAttr(t)}">${escHtml(t)}<span class="x">×</span></span>`
  ).join('');
  const clearBtn = `<button class="clear-all-btn" id="clear-all">Clear all filters</button>`;

  filterBar.innerHTML = label + pills + clearBtn;

  filterBar.querySelectorAll('.filter-pill').forEach(el =>
    el.addEventListener('click', () => removeTag(el.dataset.tag))
  );
  filterBar.querySelector('#clear-all').addEventListener('click', clearTags);
}

// ── clear grid (keep #empty) ──────────────────────────────────────────────
function clearGrid() {
  [...grid.children].forEach(c => { if (c !== emptyEl) c.remove(); });
}

// ── RENDER ALL ────────────────────────────────────────────────────────────
function renderAll() {
  const visible = sortedNotes(filteredNotes());
  emptyEl.classList.toggle('show', visible.length === 0);

  resultBar.innerHTML = `
    <span>${visible.length} of ${notes.length} notes</span>
    <select class="sort-select" id="sort-select">
      <option value="title"${sortBy === 'title' ? ' selected' : ''}>Sort: Title A–Z</option>
      <option value="year"${sortBy === 'year' ? ' selected' : ''}>Sort: Year (newest)</option>
      <option value="citations"${sortBy === 'citations' ? ' selected' : ''}>Sort: Citations ↓</option>
    </select>
  `;
  document.getElementById('sort-select').addEventListener('change', e => {
    sortBy = e.target.value;
    render();
  });

  clearGrid();
  visible.forEach(n => grid.insertBefore(makeCard(n), emptyEl));
  renderFilters();
}

// ── RENDER BY THEME ───────────────────────────────────────────────────────
function renderByTheme() {
  const visible = filteredNotes();

  resultBar.innerHTML = `<span>${visible.length} of ${notes.length} notes</span>`;
  emptyEl.classList.toggle('show', visible.length === 0);

  clearGrid();

  const groups = {};
  visible.forEach(n => {
    const theme = themeOf(n);
    if (!groups[theme]) groups[theme] = [];
    groups[theme].push(n);
  });

  const renderedThemes = new Set();
  THEME_ORDER.forEach(th => {
    if (!groups[th.key] || groups[th.key].length === 0) return;
    renderedThemes.add(th.key);

    const section = document.createElement('div');
    section.className = 'theme-section';

    const heading = document.createElement('div');
    heading.className = 'theme-heading';
    heading.innerHTML = `${escHtml(th.key)}<span class="theme-count">(${groups[th.key].length})</span>`;
    section.appendChild(heading);

    const themeGrid = document.createElement('div');
    themeGrid.className = 'theme-grid';
    groups[th.key].forEach(n => themeGrid.appendChild(makeCard(n)));
    section.appendChild(themeGrid);

    grid.insertBefore(section, emptyEl);
  });

  if (groups['Other'] && groups['Other'].length > 0) {
    const section = document.createElement('div');
    section.className = 'theme-section';

    const heading = document.createElement('div');
    heading.className = 'theme-heading';
    heading.innerHTML = `Other<span class="theme-count">(${groups['Other'].length})</span>`;
    section.appendChild(heading);

    const themeGrid = document.createElement('div');
    themeGrid.className = 'theme-grid';
    groups['Other'].forEach(n => themeGrid.appendChild(makeCard(n)));
    section.appendChild(themeGrid);

    grid.insertBefore(section, emptyEl);
  }

  renderFilters();
}

// ── CITATION EXPLORER ─────────────────────────────────────────────────────

function renderTopCited() {
  browseArea.style.display  = 'none';
  ceExplorer.style.display  = 'flex';
  panel.classList.remove('open');
  openId = null;

  renderCeLeft();
  if (ceSelectedId && byId[ceSelectedId]) {
    renderCeDetail(byId[ceSelectedId]);
  } else {
    renderCeSummary();
  }
}

// ── CE Left panel ─────────────────────────────────────────────────────────
function renderCeLeft() {
  const allCited = notes
    .filter(n => n.citation_count > 0)
    .sort((a, b) => b.citation_count - a.citation_count);

  ceLeft.innerHTML = `
    <div class="ce-hd">
      <div class="ce-hd-title">Citation Explorer</div>
      <div class="ce-hd-sub">Click any paper to see what it influenced</div>
      <input class="ce-search" id="ce-search-input"
             placeholder="Filter papers…"
             value="${escAttr(ceQuery)}"
             autocomplete="off" spellcheck="false">
    </div>
    <div class="ce-list" id="ce-list"></div>
  `;

  document.getElementById('ce-search-input').addEventListener('input', e => {
    ceQuery = e.target.value.trim();
    buildCeList(allCited);
  });

  buildCeList(allCited);
}

function buildCeList(allCited) {
  const listEl = document.getElementById('ce-list');
  if (!listEl) return;

  const q = ceQuery.toLowerCase();
  const filtered = q
    ? allCited.filter(n => n.title.toLowerCase().includes(q))
    : allCited;

  listEl.innerHTML = '';

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="ce-empty">No papers match your filter.</div>';
    return;
  }

  filtered.forEach(n => {
    const rank = allCited.indexOf(n) + 1;
    const pct  = Math.max((n.citation_count / 100000) * 100, 0.4);
    const cls  = citBarClass(n.citation_count);

    const item = document.createElement('div');
    item.className = 'ce-item' + (n.id === ceSelectedId ? ' active' : '');
    item.dataset.id = n.id;
    item.innerHTML = `
      <span class="ce-rank">#${rank}</span>
      <div class="ce-info">
        <div class="ce-item-title">${escHtml(n.title)}</div>
        <div class="ce-item-year">${n.year || '—'}</div>
      </div>
      <div class="ce-bar-wrap">
        <div class="ce-bar-track">
          <div class="ce-bar-fill ${cls}" style="width:${pct}%"></div>
        </div>
        <div class="ce-bar-num">${fmtCitShort(n.citation_count)}</div>
      </div>
    `;

    item.addEventListener('click', () => {
      ceSelectedId = n.id;
      listEl.querySelectorAll('.ce-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      renderCeDetail(n);
    });

    listEl.appendChild(item);
  });
}

// ── CE Summary (default right panel) ─────────────────────────────────────
function renderCeSummary() {
  const cited     = notes.filter(n => n.citation_count > 0);
  const totalCit  = cited.reduce((s, n) => s + (n.citation_count || 0), 0);
  const topPaper  = [...cited].sort((a, b) => b.citation_count - a.citation_count)[0];
  const mambaNote = byId['Mamba'] || byId['mamba_linear_time'];

  ceRight.innerHTML = `
    <div class="ce-summary-title">Citation Overview</div>
    <p class="ce-summary-sub">
      Select a paper from the left panel to explore its citation impact
      and the downstream works it influenced.
    </p>

    <div class="ce-summary-grid">
      <div class="ce-stat-card">
        <div class="ce-stat-label">Papers in Wiki</div>
        <div class="ce-stat-value">${notes.length}</div>
      </div>
      <div class="ce-stat-card">
        <div class="ce-stat-label">Total Citations Tracked</div>
        <div class="ce-stat-value">${totalCit.toLocaleString()}</div>
      </div>
      <div class="ce-stat-card">
        <div class="ce-stat-label">Most Cited</div>
        <div class="ce-stat-value" style="font-size:.92rem;line-height:1.3">
          ${topPaper ? escHtml(topPaper.title) : '—'}
        </div>
        <div class="ce-stat-sub">
          ${topPaper ? topPaper.citation_count.toLocaleString() + ' citations' : ''}
        </div>
      </div>
      <div class="ce-stat-card">
        <div class="ce-stat-label">Fastest Growing</div>
        <div class="ce-stat-value" style="font-size:.92rem;line-height:1.3">Mamba</div>
        <div class="ce-stat-sub">4,841 citations in 18 months</div>
      </div>
    </div>

    <div class="ce-clusters-label">Citation Clusters</div>
    <div class="ce-cluster-pills">
      <span class="ce-cluster-pill"
        style="background:rgba(107,114,128,.14);color:#9ca3af;border-color:rgba(107,114,128,.3)">
        Foundations
      </span>
      <span class="ce-cluster-pill"
        style="background:rgba(99,102,241,.14);color:#818cf8;border-color:rgba(99,102,241,.3)">
        Efficiency
      </span>
      <span class="ce-cluster-pill"
        style="background:rgba(13,148,136,.14);color:#2dd4bf;border-color:rgba(13,148,136,.3)">
        Inference
      </span>
      <span class="ce-cluster-pill"
        style="background:rgba(234,88,12,.14);color:#fb923c;border-color:rgba(234,88,12,.3)">
        Hardware
      </span>
    </div>
  `;
}

// ── CE Detail (paper selected) ─────────────────────────────────────────────
function renderCeDetail(n) {
  const pct   = Math.max((n.citation_count / 100000) * 100, 1);
  const color = citBarHex(n.citation_count);

  const authorsPart = n.authors
    ? `<span>${escHtml(n.authors)}</span><span class="ce-meta-sep">·</span>`
    : '';
  const yearPart = n.year
    ? `<span>${escHtml(n.year)}</span><span class="ce-meta-sep">·</span>`
    : '';
  const arxivPart = n.arxiv
    ? `<a href="https://arxiv.org/abs/${escAttr(n.arxiv)}" target="_blank" rel="noopener" class="ce-arxiv-link">
         arXiv: ${escHtml(n.arxiv)} ↗
       </a>`
    : '';

  // Citing papers table
  let citeSection = '';
  if (n.cited_by_details && n.cited_by_details.length > 0) {
    const rows = n.cited_by_details.map((c, i) => {
      const thCls   = (c.theme || '').replace(/[^a-z-]/g, '');
      const thLabel = escHtml(c.theme || '');
      const citCount = c.citations ? ('~' + c.citations.toLocaleString()) : '—';
      const arxivLink = c.arxiv
        ? `<a href="https://arxiv.org/abs/${escAttr(c.arxiv)}" target="_blank"
              rel="noopener" class="cite-arxiv" title="Open on arXiv">↗</a>`
        : '';
      return `
        <tr>
          <td class="cite-rank">${i + 1}</td>
          <td>
            <button class="cite-title-link" data-arxiv="${escAttr(c.arxiv || '')}"
                    data-title="${escAttr(c.title)}">
              ${escHtml(c.title)}
            </button>
          </td>
          <td class="cite-year">${c.year || '—'}</td>
          <td class="cite-count">${citCount}</td>
          <td><span class="theme-pill ${thCls}">${thLabel}</span></td>
          <td>${arxivLink}</td>
        </tr>`;
    }).join('');

    citeSection = `
      <table class="cite-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Paper</th>
            <th>Year</th>
            <th>~Citations</th>
            <th>Theme</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  } else {
    citeSection = `<p class="cite-no-data">Citation detail not yet tracked for this paper.</p>`;
  }

  // Related in this wiki
  const relatedIds = (n.links || []).filter(id => byId[id] && id !== n.id);
  const relatedHtml = relatedIds.length > 0
    ? `<div class="related-pills">
         ${relatedIds.map(id =>
           `<a href="#" class="related-pill" data-noteid="${escAttr(id)}">${escHtml(byId[id].title)}</a>`
         ).join('')}
       </div>`
    : `<p class="cite-no-data">No linked notes resolved in this wiki.</p>`;

  ceRight.innerHTML = `
    <button class="ce-back-btn" id="ce-back">← All Papers</button>

    <div class="ce-detail-title">${escHtml(n.title)}</div>
    <div class="ce-detail-meta">
      ${authorsPart}${yearPart}${arxivPart}
    </div>

    <div class="ce-total-cit">${(n.citation_count || 0).toLocaleString()}</div>
    <div class="ce-total-label">total citations</div>
    <div class="ce-full-bar" style="background:${color};width:${pct}%"></div>

    <div class="ce-section">
      <div class="ce-section-title">What this paper introduced</div>
      <p class="ce-tldr">${escHtml(n.tldr || 'No summary available.')}</p>
    </div>

    <div class="ce-section">
      <div class="ce-section-title">Top 10 papers that cite this work</div>
      ${citeSection}
    </div>

    <div class="ce-section">
      <div class="ce-section-title">Related papers in this wiki</div>
      ${relatedHtml}
    </div>
  `;

  // Wire back button
  document.getElementById('ce-back').addEventListener('click', () => {
    ceSelectedId = null;
    const listEl = document.getElementById('ce-list');
    if (listEl) listEl.querySelectorAll('.ce-item').forEach(el => el.classList.remove('active'));
    renderCeSummary();
  });

  // Wire citing paper title clicks
  ceRight.querySelectorAll('.cite-title-link').forEach(btn => {
    btn.addEventListener('click', e => {
      e.preventDefault();
      const arxivId = btn.dataset.arxiv;
      const match = arxivId ? byArxiv[arxivId] : null;
      if (match) {
        ceSelectedId = match.id;
        const listEl = document.getElementById('ce-list');
        if (listEl) {
          listEl.querySelectorAll('.ce-item').forEach(el => el.classList.remove('active'));
          const activeItem = listEl.querySelector(`[data-id="${escAttr(match.id)}"]`);
          if (activeItem) activeItem.classList.add('active');
        }
        renderCeDetail(match);
        ceRight.scrollTop = 0;
      } else if (arxivId) {
        window.open('https://arxiv.org/abs/' + arxivId, '_blank', 'noopener');
      }
    });
  });

  // Wire related pills — switch to All tab and open note panel
  ceRight.querySelectorAll('.related-pill').forEach(el => {
    el.addEventListener('click', e => {
      e.preventDefault();
      activeTab = 'all';
      document.querySelectorAll('.tab-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.tab === 'all'));
      render();
      openNote(el.dataset.noteid);
    });
  });
}

// ── MAIN RENDER DISPATCH ──────────────────────────────────────────────────
function render() {
  if (activeTab === 'top-cited') {
    browseArea.style.display = 'none';
    ceExplorer.style.display = 'flex';
    renderTopCited();
  } else {
    browseArea.style.display = '';
    ceExplorer.style.display = 'none';
    if (activeTab === 'by-theme') {
      renderByTheme();
    } else {
      renderAll();
    }
  }
}

// ── open panel ───────────────────────────────────────────────────────────
function openNote(id) {
  const n = byId[id];
  if (!n) return;

  openId = id;
  panelYear.textContent = n.year || '';

  if (n.citation_count) {
    panelCitations.textContent = `📚 ${fmtCit(n.citation_count)} citations`;
    panelCitations.style.display = 'inline-block';
  } else {
    panelCitations.style.display = 'none';
  }

  panelTitle.textContent = n.title;

  panelTags.innerHTML = n.tags.map(t =>
    `<span class="tag${activeTags.has(t) ? ' active-tag' : ''}" data-tag="${escAttr(t)}">${escHtml(t)}</span>`
  ).join('');
  panelTags.querySelectorAll('.tag').forEach(el =>
    el.addEventListener('click', () => toggleTag(el.dataset.tag))
  );

  panelBody.innerHTML = resolveWikilinks(n.html);
  panelBody.querySelectorAll('a.wikilink:not(.missing)').forEach(a =>
    a.addEventListener('click', e => {
      e.preventDefault();
      openNote(a.dataset.noteid);
    })
  );

  renderMath(panelBody);

  panel.classList.add('open');
  panelBody.scrollTop = 0;
  if (activeTab !== 'top-cited') render();
}

// ── KaTeX renderer ───────────────────────────────────────────────────────
function renderMath(el) {
  if (typeof renderMathInElement !== 'function') return;
  renderMathInElement(el, {
    delimiters: [
      { left: '$$', right: '$$', display: true  },
      { left: '$',  right: '$',  display: false },
      { left: '\\(', right: '\\)', display: false },
      { left: '\\[', right: '\\]', display: true  }
    ],
    throwOnError: false
  });
}

function closePanel() {
  panel.classList.remove('open');
  openId = null;
  if (activeTab !== 'top-cited') render();
}

// ── tag toggle ───────────────────────────────────────────────────────────
function toggleTag(tag) {
  if (!tag) return;
  if (activeTags.has(tag)) activeTags.delete(tag);
  else                     activeTags.add(tag);
  render();
}

function removeTag(tag) {
  activeTags.delete(tag);
  render();
}

function clearTags() {
  activeTags.clear();
  render();
}

// ── utils ─────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return String(s).replace(/"/g,'&quot;'); }

// ── events ────────────────────────────────────────────────────────────────
searchEl.addEventListener('input', () => {
  query = searchEl.value.trim();
  if (activeTab !== 'top-cited') render();
});

closeBtn.addEventListener('click', closePanel);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchEl.focus();
    searchEl.select();
  }
});

setupTheme();
init();
</script>
